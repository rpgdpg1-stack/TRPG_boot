<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrainingRPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="nav-area">
                <div class="day-title" id="day-display" onclick="openDayPicker()">A</div>
                <div class="progress-wrapper">
                    <span class="progress-label" id="progress-text">0 / 0 DONE</span>
                    <div class="progress-bar-bg"><div id="progress-fill"></div></div>
                </div>
            </div>
        </header>

        <div id="exercise-list" class="exercise-list"></div>

        <button class="btn-finish" onclick="finishWorkout()">ЗАВЕРШИТЬ ТРЕНИРОВКУ</button>

        <div id="day-picker" class="modal-overlay hidden" onclick="closeDayPicker()">
            <div class="bottom-sheet" onclick="event.stopPropagation()">
                <div class="sheet-line"></div>
                <div class="sheet-title">ВЫБЕРИ ДЕНЬ</div>
                <div class="days-grid">
                    <button onclick="changeDay('A')">A</button>
                    <button onclick="changeDay('B')">B</button>
                    <button onclick="changeDay('C')">C</button>
                </div>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item">🏠</div>
            <div class="tab-item active">🔥</div>
            <div class="tab-item">⚙️</div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
