<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrainingRPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="nav-area">
                <!-- Огромная буква дня с индикатором выбора -->
                <div class="day-selector-trigger" onclick="openDayPicker()">
                    <span id="day-display">A</span>
                    <span class="arrow-down">↓</span>
                </div>
                
                <div class="progress-container">
                    <span id="progress-text">0 / 0 DONE</span>
                    <div class="progress-bg">
                        <div id="progress-fill"></div>
                    </div>
                </div>
            </div>
        </header>

        <div id="exercise-list"></div>

        <button class="btn-finish" onclick="finishWorkout()">ЗАВЕРШИТЬ ТРЕНИРОВКУ</button>

        <!-- Bottom Sheet для выбора дня -->
        <div id="day-picker-overlay" class="modal-overlay hidden" onclick="closeDayPicker()">
            <div class="bottom-sheet" onclick="event.stopPropagation()">
                <div class="sheet-handle"></div>
                <div class="sheet-header">ДЕНЬ ТРЕНИРОВКИ</div>
                <div class="days-grid">
                    <div class="day-option" onclick="changeDay('A')">
                        <span class="day-letter">A</span>
                        <span class="day-name">ДЕНЬ А</span>
                    </div>
                    <div class="day-option" onclick="changeDay('B')">
                        <span class="day-letter">Б</span>
                        <span class="day-name">ДЕНЬ Б</span>
                    </div>
                    <div class="day-option" onclick="changeDay('C')">
                        <span class="day-letter">C</span>
                        <span class="day-name">ДЕНЬ C</span>
                    </div>
                </div>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item">🏠</div>
            <div class="tab-item active">🔥</div>
            <div class="tab-item">⚙️</div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
