<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TrainingRPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Лоадер: Тот самый бицепс и мелкий пиксельный текст -->
        <div id="loader" class="loader">
            <div class="bicep-emoji">💪🏻</div>
            <p class="loader-text-tiny">ЗАГРУЗКА...</p>
        </div>

        <header class="sticky-header">
            <div class="header-content">
                <div class="day-selector-trigger" onclick="openDayPicker()">
                    <span id="day-display">A</span>
                    <span class="arrow-down">↓</span>
                </div>
                <div class="progress-section">
                    <span id="progress-text">0 / 0 ПРОГРЕСС</span>
                    <div class="progress-bg">
                        <div id="progress-fill"></div>
                    </div>
                </div>
            </div>
        </header>

        <main class="content-scroll" id="main-content" style="display: none;">
            <div id="exercise-list"></div>
            <div class="footer-padding">
                <button class="btn-finish-capsule" onclick="finishWorkout()">ЗАВЕРШИТЬ ТРЕНИРОВКУ</button>
            </div>
        </main>

        <!-- Модалка выбора дня -->
        <div id="day-picker-overlay" class="modal-overlay hidden" onclick="closeDayPicker()">
            <div class="bottom-sheet" onclick="event.stopPropagation()">
                <div class="sheet-handle"></div>
                <div class="days-grid">
                    <div class="day-option" onclick="changeDay('A')"><span>A</span></div>
                    <div class="day-option" onclick="changeDay('B')"><span>Б</span></div>
                    <div class="day-option" onclick="changeDay('C')"><span>C</span></div>
                </div>
            </div>
        </div>

        <!-- Модалка инфо -->
        <div id="info-modal" class="info-overlay hidden">
            <div class="info-container">
                <div class="info-nav" onclick="closeInfo()">← НАЗАД</div>
                <div id="info-content-body"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
