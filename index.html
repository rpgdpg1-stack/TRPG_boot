<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Fit Pro App</title>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0C0C0C;
            --accent: #AAD066;
            --card: #222222;
            --text: #FFFFFF;
            --muted: #888888;
            --border: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; padding: 0 16px 40px; min-height: 100vh; }

        .header {
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
            padding: 20px 0 15px;
            user-select: none;
        }

        .nav-area { display: flex; flex-direction: column; align-items: center; cursor: grab; }

        .day-title {
            font-family: 'Tiny5', sans-serif;
            font-size: 64px;
            color: var(--accent);
            line-height: 0.8;
            margin-bottom: 15px;
        }

        .progress-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-label { font-size: 13px; color: var(--muted); white-space: nowrap; font-weight: 800; }

        .progress-bar-bg {
            flex-grow: 1;
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin: 25px 0 12px 4px;
            font-weight: 800;
            opacity: 0.8;
        }

        .exercise-list { display: flex; flex-direction: column; gap: 12px; }

        /* CARDS (Увеличены на 40%) */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 120px; /* Увеличено с 85px */
            position: relative;
            transition: 0.2s;
        }

        .card.done { opacity: 0.4; filter: grayscale(0.8); }

        .img-box {
            width: 85px; /* Соразмерно увеличено */
            height: 85px;
            background: #111;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .info { flex-grow: 1; overflow: hidden; padding-right: 5px; }
        .name { font-size: 17px; font-weight: 800; margin-bottom: 6px; line-height: 1.2; }
        .meta { font-size: 13px; color: var(--muted); font-weight: 500; }

        /* WEIGHT INPUT */
        .weight-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 65px;
        }

        .weight-val {
            font-size: 24px; /* Крупнее для удобства */
            font-weight: 900;
            color: var(--accent);
            background: transparent;
            border: none;
            width: 100%;
            text-align: center;
            outline: none;
            font-family: 'Manrope', sans-serif;
        }

        .weight-unit { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; }

        /* CHECKBOX */
        .check-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .done .check-btn {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* REPLACE BUTTON (Символ стрелочки) */
        .replace-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            color: var(--muted);
            cursor: pointer;
            padding: 5px;
            z-index: 5;
        }
        
        .replace-btn svg { width: 18px; height: 18px; fill: currentColor; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body onclick="blurAllInputs(event)">

<div class="header">
    <div class="nav-area" id="nav-area">
        <div class="day-title" id="day-title">A</div>
        <div class="progress-wrapper">
            <span class="progress-label" id="progress-text">ПРОГРЕСС 0/8</span>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
        </div>
    </div>
</div>

<div id="workout-content"></div>

<div class="modal" id="replace-modal" onclick="this.style.display='none'">
    <div style="width: 90%;">
        <p style="text-align: center; margin-bottom: 20px; font-size: 14px; color: var(--accent); font-weight: 800;">ВЫБЕРИТЕ ЗАМЕНУ</p>
        <div class="card" style="opacity: 1;">
            <div class="img-box">📸</div>
            <div class="info">
                <div class="name">Альтернативное упр.</div>
                <div class="meta">Доступно в след. версии</div>
            </div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const content = document.getElementById('workout-content');
    let currentDay = 'A';

    const program = {
        'A': {
            base: [
                { id: 'a1', name: 'Подтягивания / Тяга блока', meta: 'Спина • 3х8-10' },
                { id: 'a2', name: 'Приседания в Смите', meta: 'Ноги • 3х8-10' },
                { id: 'a3', name: 'Жим штанги лежа', meta: 'Грудь • 3х8-10' }
            ],
            iso: [
                { id: 'a4', name: 'Тяга к лицу', meta: 'Задняя дельта • 3х15' },
                { id: 'a5', name: 'Махи гантелями', meta: 'Плечи • 3х12-15' },
                { id: 'a6', name: 'Сгибания ног', meta: 'Бицепс бедра • 3х12-15' },
                { id: 'a7', name: 'Бицепс на накл. скамье', meta: 'Бицепс • 3х10-12' },
                { id: 'a8', name: 'Подъем ног в висе', meta: 'Пресс • 3х15' }
            ]
        },
        'B': {
            base: [
                { id: 'b1', name: 'Жим ногами', meta: 'Ноги • 3х10-12' },
                { id: 'b2', name: 'Горизонтальная тяга', meta: 'Спина • 3х10' },
                { id: 'b3', name: 'Жим гантелей (наклон)', meta: 'Верх груди • 3х10-12' }
            ],
            iso: [
                { id: 'b4', name: 'Бабочка (Сведения)', meta: 'Грудь • 3х12-15' },
                { id: 'b5', name: 'Разгибания ног', meta: 'Квадрицепс • 3х12-15' },
                { id: 'b6', name: 'Армейский жим', meta: 'Плечи • 3х8-10' },
                { id: 'b7', name: 'Сведения / Разведения', meta: 'Бедра • 3х15-20' },
                { id: 'b8', name: 'Трицепс на блоке', meta: 'Трицепс • 3х12' }
            ]
        }
    };

    function render() {
        const dayData = program[currentDay];
        let html = '<div class="section-title">Базовые упражнения</div><div class="exercise-list">';
        dayData.base.forEach(ex => html += createCard(ex));
        html += '</div><div class="section-title">Изоляция</div><div class="exercise-list">';
        dayData.iso.forEach(ex => html += createCard(ex));
        html += '</div>';
        content.innerHTML = html;
        updateProgress();
    }

    function createCard(ex) {
        const weight = localStorage.getItem(`w_${ex.id}`) || '0';
        return `
            <div class="card" id="card-${ex.id}">
                <div class="replace-btn" onclick="openReplace(event)">
                    <svg viewBox="0 0 24 24"><path d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/></svg>
                </div>
                <div class="img-box">📸</div>
                <div class="info">
                    <div class="name">${ex.name}</div>
                    <div class="meta">${ex.meta}</div>
                </div>
                <div class="weight-control">
                    <input type="number" 
                           inputmode="decimal" 
                           class="weight-val" 
                           value="${weight}" 
                           onchange="saveWeight('${ex.id}', this.value)" 
                           onkeydown="handleKey(event)"
                           onclick="event.stopPropagation()">
                    <span class="weight-unit">кг</span>
                </div>
                <div class="check-btn" onclick="toggleDone('${ex.id}')">
                    <svg width="18" height="14" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="black" stroke-width="2.5" stroke-linecap="round"/></svg>
                </div>
            </div>
        `;
    }

    function toggleDone(id) {
        const el = document.getElementById(`card-${id}`);
        el.classList.toggle('done');
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        updateProgress();
    }

    function saveWeight(id, val) { localStorage.setItem(`w_${id}`, val); }

    // Логика скрытия клавиатуры
    function handleKey(e) { if (e.key === 'Enter') e.target.blur(); }
    
    function blurAllInputs(e) {
        if (e.target.tagName !== 'INPUT') {
            document.querySelectorAll('input').forEach(i => i.blur());
        }
    }

    function updateProgress() {
        const total = document.querySelectorAll('.card').length;
        const done = document.querySelectorAll('.card.done').length;
        const perc = (done / total) * 100;
        document.getElementById('progress-fill').style.width = perc + '%';
        document.getElementById('progress-text').innerText = `ПРОГРЕСС ${done}/${total}`;
    }

    function openReplace(e) {
        e.stopPropagation();
        document.getElementById('replace-modal').style.display = 'flex';
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    // Свайп по хэдеру
    let touchStartX = 0;
    const navArea = document.getElementById('nav-area');
    navArea.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
    navArea.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 60) {
            currentDay = currentDay === 'A' ? 'B' : 'A';
            document.getElementById('day-title').innerText = currentDay;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            render();
            window.scrollTo(0,0);
        }
    });

    render();
</script>
</body>
</html>
