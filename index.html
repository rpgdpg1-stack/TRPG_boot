<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💪 Тренировки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&family=Tiny5&display=swap');
:root {
  --bg:#0C0C0C; --card:#242424; --card2:#2e2e2e;
  --accent:#9DC44A; --accent-dim:rgba(157,196,74,0.1);
  --text:#efefef; --muted:#5a5a5a; --border:#2a2a2a;
  --glass-bg: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:90px}

/* ═══════════════════════════════
HEADER
═══════════════════════════════ */
.header{
position:sticky;top:0;z-index:100;
padding:10px 0 0;
background:none;
}
.header::before{
content:’’;position:fixed;top:0;left:0;right:0;height:36px;
background:linear-gradient(to bottom,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0) 100%);
pointer-events:none;z-index:-1;
}

/* Контейнер SVG-хедера */
.header-svg-area{
position:relative;
width:100%;
height:145px;
margin-bottom:10px;
padding:0;
background:transparent;
box-sizing:border-box;
}
.header-svg-area svg.day-svg{
display:block;
width:100%;
height:145px;
cursor:pointer;
background:transparent;
-webkit-tap-highlight-color:transparent;
}
.header-svg-area svg.day-svg path,
.header-svg-area svg.day-svg text{
pointer-events:all;
cursor:pointer;
}

/* мусор убран */

/* progress-wrap удалён — прогресс встроен в SVG */

/* ═══════════════════════════════
CONTENT
═══════════════════════════════ */
.content{padding:16px 12px 0}
.muscle-group{margin-bottom:24px}
.muscle-label{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;padding:0 4px;text-align:center}
.muscle-label .dot{width:6px;height:6px;border-radius:50%;background:#fff;flex-shrink:0}
.muscle-label span{font-family:‘Bebas Neue’,sans-serif;font-size:15px;letter-spacing:3px;color:#fff;text-transform:uppercase}
.exercise-card{background:rgba(36,36,36,0.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.07);border-radius:25px;margin-bottom:8px;overflow:hidden;transition:border-color .25s,opacity .25s}
.exercise-card.done{border-color:#3a3a3a;opacity:.65}
.ex-main{display:flex;align-items:center;padding:8px 10px;gap:12px}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:12.5px;font-weight:700;line-height:1.4;color:#b0b0b0;cursor:pointer}
.exercise-card.done .ex-name{text-decoration:line-through;color:var(–muted)}
.ex-sets{font-size:10px;color:var(–muted);margin-top:3px}
.ex-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.weight-col{display:flex;flex-direction:row;align-items:center;justify-content:center;flex-shrink:0;gap:0;cursor:pointer;padding:6px;border-radius:15px;transition:background .15s}
.weight-col.editing .weight-val{border-color:var(–accent);background:rgba(77,200,100,0.08)}
.weight-val{font-family:‘Bebas Neue’,sans-serif;font-size:24px;color:var(–accent);line-height:1;text-align:center;padding:6px;display:inline-flex;align-items:center;justify-content:center;border:2px solid transparent;border-radius:12px;transition:border-color .2s}
.weight-unit{font-size:9px;color:var(–muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-left:3px}
.ex-check{width:36px;height:36px;border-radius:15px;border:2px solid #3a3a3a;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;color:transparent}
.exercise-card.done .ex-check{background:var(–accent);border-color:#5a5a5a;color:#000}
.ex-img{width:120px;height:120px;border-radius:17px;overflow:hidden;flex-shrink:0;background:var(–card2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.ex-img img{width:120px;height:120px;object-fit:contain;border-radius:17px;display:block}
.ex-img svg{width:36px;height:36px;stroke:var(–muted);stroke-width:1.5;fill:none}

/* weight input bar */
.weight-input-bar{display:none;position:fixed;left:18px;right:18px;bottom:18px;z-index:1000;background:var(–glass-bg);backdrop-filter:blur(20px) saturate(200%) brightness(115%);-webkit-backdrop-filter:blur(20px) saturate(200%) brightness(115%);border:1px solid var(–glass-border);border-radius:25px;padding:10px 16px;align-items:center;gap:12px;box-shadow:0 4px 32px rgba(0,0,0,.6)}
.weight-input-bar.open{display:flex}
.wib-label{font-size:11px;color:var(–muted);flex:1;line-height:1.4;font-weight:600}
.wib-label b{display:block;color:var(–text);font-size:12px;margin-bottom:1px}
.wib-kg{font-size:10px;color:var(–muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.wib-input{background:var(–card2);border:2px solid var(–accent);border-radius:17px;color:var(–accent);font-family:‘Bebas Neue’,sans-serif;font-size:28px;text-align:center;padding:8px 12px;outline:none;width:110px;flex-shrink:0}

/* image overlay */
.img-expand-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.85);align-items:center;justify-content:center}
.img-expand-overlay.open{display:flex}
.img-expand-inner{width:88vw;max-width:380px;border-radius:25px;overflow:hidden;background:var(–card);padding:10px;box-shadow:0 24px 64px rgba(0,0,0,.9)}
.img-expand-inner img{width:100%;height:auto;display:block;border-radius:15px}

/* done banner / finish */
.done-banner{display:none;background:linear-gradient(135deg,rgba(157,196,74,.08),rgba(157,196,74,.02));border:1px solid rgba(157,196,74,.25);border-radius:25px;padding:16px;margin:0 12px 16px;text-align:center}
.done-banner.show{display:block}
.done-banner .db-emoji{font-size:32px;margin-bottom:6px}
.done-banner .db-text{font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:2px;color:var(–accent)}
.done-banner .db-sub{font-size:11px;color:var(–muted);margin-top:4px}
.finish-btn{display:block;width:100%;padding:14px 16px;border-radius:25px;background:rgba(200,60,60,0.85);backdrop-filter:blur(20px) saturate(200%) brightness(115%);-webkit-backdrop-filter:blur(20px) saturate(200%) brightness(115%);border:1px solid rgba(255,120,120,0.25);color:#fff;font-family:‘Bebas Neue’,sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;transition:opacity .2s;text-align:center}
.finish-btn:active{opacity:.7}

/* edit modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:rgba(26,26,26,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%;max-width:480px;border-top:1px solid rgba(255,255,255,0.08)}
.modal-handle{width:36px;height:4px;background:var(–border);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:‘Bebas Neue’,sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:14px;color:var(–accent)}
.modal-label{font-size:10px;color:var(–muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:700}
.modal-input{width:100%;background:var(–card2);border:1.5px solid var(–border);border-radius:10px;color:var(–text);font-family:‘Manrope’,sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:none;line-height:1.5;transition:border-color .2s;margin-bottom:12px}
.modal-input:focus{border-color:var(–accent)}
.modal-row{display:flex;gap:8px;margin-bottom:16px}
.modal-row>div{flex:1}
.modal-btns{display:flex;gap:8px}
.btn-save{flex:1;padding:13px;border-radius:10px;background:var(–accent);border:none;color:#000;font-family:‘Manrope’,sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:opacity .2s}
.btn-save:active{opacity:.8}
.btn-cancel{padding:13px 18px;border-radius:10px;background:var(–card2);border:1px solid var(–border);color:var(–muted);font-family:‘Manrope’,sans-serif;font-weight:600;font-size:13px;cursor:pointer}

/* history */
.hist-content{padding:16px 12px}
.hist-day-header{font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:1px;color:var(–accent);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.hist-entry{background:var(–card);border:1px solid var(–border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.hist-date{font-size:10px;color:var(–muted);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.hist-pills{display:flex;flex-wrap:wrap;gap:5px}
.hist-pill{background:var(–card2);border-radius:8px;padding:4px 9px;font-size:11px;color:var(–text);display:flex;gap:5px;align-items:center;font-weight:500}
.hist-pill .hw{color:var(–accent);font-weight:800;font-family:‘Bebas Neue’,sans-serif;font-size:14px;line-height:1}
.hist-empty{color:var(–muted);font-size:13px;text-align:center;padding:40px 20px;line-height:1.8}

/* nav */
.bottom-nav{position:fixed;bottom:18px;left:0;right:0;display:flex;z-index:200;padding:0 18px;gap:12px;justify-content:space-between}
.nav-btn{flex:1;max-width:120px;height:70px;padding:0 8px;background:rgba(28,28,30,0.72);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,0.14);border-radius:35px;color:var(–muted);cursor:pointer;font-family:‘Manrope’,sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:color .2s,background .2s}
.nav-btn.active{color:var(–accent);background:rgba(28,28,30,0.85);border-color:rgba(157,196,74,0.25);}
.nav-btn svg{width:20px;height:20px;stroke-width:2}

.view{display:none}
.view.active{display:block}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:#3C643C;color:#000;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:800;opacity:0;transition:all .3s;z-index:900;pointer-events:none;white-space:nowrap;font-family:‘Manrope’,sans-serif}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* app-title for history */
.app-title{font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:3px;color:#fff}
</style>

</head>

function showDaySvg(dayIdx){

  });

  S.currentDay = dayIdx;

}

/* клики по тапам каждого SVG-дня */
function bindSvgClicks(){
  // id элемента → номер дня (0/1/2)
  var map = {
    'd1-tab1':0,'d1-tab2':1,'d1-tab3':2,
    'd1-num1':0,'d1-num2':1,'d1-num3':2,
    'd2-tab1':0,'d2-tab2':1,'d2-tab3':2,
    'd2-num1':0,'d2-num2':1,'d2-num3':2,
    'd3-tab1':0,'d3-tab2':1,'d3-tab3':2,
    'd3-num1':0,'d3-num2':1,'d3-num3':2,
    'd1-tab1-hit':0,'d1-tab2-hit':1,'d1-tab3-hit':2,
    'd2-tab1-hit':0,'d2-tab2-hit':1,'d2-tab3-hit':2,
    'd3-tab1-hit':0,'d3-tab2-hit':1,'d3-tab3-hit':2
  };

  // Вешаем click на каждый элемент напрямую — надёжнее делегирования
  Object.keys(map).forEach(function(id){
    var el = document.getElementById(id);
    if(!el) return;
    var day = map[id];
    // touchend для мобилы (быстрее чем click, нет 300ms задержки)
    el.addEventListener('touchend', function(e){
      e.stopPropagation(); // не пускаем к swipe-обработчику
      e.preventDefault();
      switchDay(day);
    }, {passive:false});
    // click для десктоп/preview
    el.addEventListener('click', function(e){
      e.stopPropagation();
      switchDay(day);
    });
  });
}

function updateProgress(){
  var day = S.program[S.currentDay];
  var allIds=[];
  day.groups.forEach(function(g){ g.exercises.forEach(function(e){ allIds.push(e.id); }); });
  var doneCount = allIds.filter(function(id){ return S.done[id]; }).length;
  var total = allIds.length;
  var pct = total ? doneCount/total : 0;
  var svgIdx = S.currentDay+1;
  var fillEl = document.getElementById('progFill'+svgIdx);
  var labelEl = document.getElementById('progLabel'+svgIdx);
  if(fillEl) fillEl.setAttribute('width', Math.round(220*pct));
  if(labelEl) labelEl.textContent = doneCount+'/'+total;
}

      card.innerHTML=
        '<div class="ex-main">'+
          '<div class="ex-img" id="img_'+exId+'">'+imgInner+'</div>'+
          '<div class="ex-info">'+
            '<div class="ex-name">'+ex.name+'</div>'+

          '</div>'+
          '<div class="ex-right">'+

      wcolDiv.addEventListener('touchend',(function(id){ return function(e){ touchEndWeight(e,id); }; })(exId));
      wcolDiv.addEventListener('click',(function(id){ return function(){ onWeightClick(id); }; })(exId));

var _touchStartY=0,_touchStartX=0,_touchHandled=false;
function touchStartWeight(e,id){ _touchStartY=e.touches[0].clientY; _touchStartX=e.touches[0].clientX; _touchHandled=false; }
function touchEndWeight(e,id){
  var dy=Math.abs(e.changedTouches[0].clientY-_touchStartY);
  var dx=Math.abs(e.changedTouches[0].clientX-_touchStartX);
  if(dy>8||dx>8) return;
  e.preventDefault(); _touchHandled=true; togglePanel(id);
}
function onWeightClick(id){ if(_touchHandled){ _touchHandled=false; return; } togglePanel(id); }

function tapImg(id,animSrc){
  if(!animSrc) return;
  document.getElementById('imgOverlayImg').src=animSrc+'?t='+Date.now();
  document.getElementById('imgOverlay').classList.add('open');
}
function closeImgOverlay(){
  document.getElementById('imgOverlay').classList.remove('open');
  setTimeout(function(){ document.getElementById('imgOverlayImg').src=''; },300);
}
function toggleDone(id){
  if(S.openPanel) closeWib();
  S.done[id]=!S.done[id]; save(); renderWorkoutContent(); updateProgress();
}

var _weightFresh=false;
function togglePanel(id){
  if(S.openPanel===id){ closeWib(); return; }
  if(S.openPanel){
    document.querySelectorAll('.weight-col.editing').forEach(function(el){ el.classList.remove('editing'); });
    S.openPanel=id; _weightFresh=true; save();
    var wcol=document.getElementById('wcol_'+id); if(wcol) wcol.classList.add('editing');
    var day=S.program[S.currentDay]; var exName='';
    day.groups.forEach(function(g){ g.exercises.forEach(function(e){ if(e.id===id) exName=e.name; }); });
    document.getElementById('wibExName').textContent=exName.length>30?exName.slice(0,30)+'...':exName;
    document.getElementById('wibInput').value=(S.weights[id]!==undefined)?S.weights[id]:0;
    return;
  }
  S.openPanel=id; _weightFresh=true; save();
  document.querySelector('.bottom-nav').style.display='none';
  var wcol=document.getElementById('wcol_'+id); if(wcol) wcol.classList.add('editing');
  var day=S.program[S.currentDay]; var exName='';
  day.groups.forEach(function(g){ g.exercises.forEach(function(e){ if(e.id===id) exName=e.name; }); });
  document.getElementById('wibExName').textContent=exName.length>30?exName.slice(0,30)+'...':exName;
  var wibInp=document.getElementById('wibInput');
  wibInp.value=(S.weights[id]!==undefined)?S.weights[id]:0;
  var bar=document.getElementById('weightInputBar');
  bar.style.bottom='18px'; bar.classList.add('open');
  function onVPResize(){
    var vv=window.visualViewport;
    var kbHeight=window.innerHeight-vv.height;
    bar.style.bottom=(kbHeight>50?kbHeight+4:18)+'px';
  }
  if(window.visualViewport){ window.visualViewport.addEventListener('resize',onVPResize); window._wibVVCleanup=onVPResize; onVPResize(); }
  wibInp.focus();
  try{ wibInp.setSelectionRange(wibInp.value.length,wibInp.value.length); }catch(e){}
}

function closeWib(){
  S.openPanel=null; _weightFresh=false; save();
  if(window._wibVVCleanup&&window.visualViewport){ window.visualViewport.removeEventListener('resize',window._wibVVCleanup); window._wibVVCleanup=null; }
  document.getElementById('wibInput').blur();
  var bar=document.getElementById('weightInputBar');
  bar.classList.remove('open'); bar.style.bottom='18px';
  document.querySelectorAll('.weight-col.editing').forEach(function(el){ el.classList.remove('editing'); });
  document.querySelector('.bottom-nav').style.display='flex';
}
function onWibBlur(){
  if(window.Telegram&&window.Telegram.WebApp){ try{ window.Telegram.WebApp.HapticFeedback.impactOccurred('light'); }catch(e){} }
  setTimeout(function(){ if(S.openPanel) closeWib(); },150);
}
function onWibKeydown(e){
  if(e.key==='Enter'){ closeWib(); return; }
  if(e.key==='Backspace'||e.key==='Delete'){ _weightFresh=false; return; }
  if(e.key===','||e.key==='.'){ if(_weightFresh){ document.getElementById('wibInput').value=''; _weightFresh=false; } return; }
  if(_weightFresh&&e.key>='0'&&e.key<='9'){ document.getElementById('wibInput').value=''; _weightFresh=false; }
}
function onWibInput(val){
  if(!S.openPanel) return;
  var id=S.openPanel;
  var cleaned=String(val).replace(',','.');
  var valEl=document.querySelector('.weight-val[data-id="'+id+'"]');
  if(valEl) valEl.textContent=cleaned.endsWith('.')? cleaned:(parseFloat(cleaned)||0);
  S.weights[id]=Math.max(0,parseFloat(cleaned)||0);
  save();
}

   EDIT MODAL
════════════════════════════════════ */
function openEdit(di,gi,ei){
  S.editTarget={di:di,gi:gi,ei:ei};
  var ex=S.program[di].groups[gi].exercises[ei];
  document.getElementById('editName').value=ex.name;
  document.getElementById('editSets').value=ex.sets;
  document.getElementById('editReps').value=ex.reps;
  document.getElementById('editOverlay').classList.add('open');
}
function closeModal(){ document.getElementById('editOverlay').classList.remove('open'); S.editTarget=null; }
function saveEdit(){
  if(!S.editTarget) return;
  var ex=S.program[S.editTarget.di].groups[S.editTarget.gi].exercises[S.editTarget.ei];
  var n=document.getElementById('editName').value.trim();
  if(n) ex.name=n;
  ex.sets=parseInt(document.getElementById('editSets').value)||ex.sets;
  ex.reps=parseInt(document.getElementById('editReps').value)||ex.reps;
  save(); closeModal(); showToast('Сохранено'); renderWorkoutContent();
}

/* ════════════════════════════════════
   FINISH
════════════════════════════════════ */
function finishWorkout(){
  if(window.Telegram&&window.Telegram.WebApp){ try{ window.Telegram.WebApp.HapticFeedback.notificationOccurred('success'); }catch(e){} }
  var day=S.program[S.currentDay]; var allIds=[];
  day.groups.forEach(function(g){ g.exercises.forEach(function(e){ allIds.push(e.id); }); });
  var snap={};
  allIds.forEach(function(id){ snap[id]=(S.weights[id]!==undefined)?S.weights[id]:0; });
  S.history.push({date:Date.now(),dayIdx:S.currentDay,weights:snap});
  allIds.forEach(function(id){ delete S.done[id]; });
  save(); showToast('Тренировка дня '+(S.currentDay+1)+' сохранена!');
  window.scrollTo({top:0,behavior:'instant'}); renderWorkoutContent(); updateProgress();
}

/* ════════════════════════════════════
   HISTORY
════════════════════════════════════ */
function renderHistory(){
  var container=document.getElementById('histContent');
  var tempDone=[false,false,false];
  S.history.forEach(function(h){
    if(h.dayIdx>=0&&h.dayIdx<3){
      tempDone[h.dayIdx]=true;
      if(tempDone[0]&&tempDone[1]&&tempDone[2]) tempDone=[false,false,false];
    }
  });
  var calHtml='<div style="display:flex;gap:12px;margin-bottom:20px;padding:0 4px;justify-content:center">';
  for(var d=0;d<3;d++){
    var isDone=tempDone[d];
    var st=isDone
      ?'flex:1;max-width:100px;aspect-ratio:1/1;border-radius:25px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:#4DC864;border:1.5px solid #4DC864;'
      :'flex:1;max-width:100px;aspect-ratio:1/1;border-radius:25px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:rgba(255,255,255,0.09);border:1.5px solid rgba(255,255,255,0.18);backdrop-filter:blur(20px) saturate(200%) brightness(115%);-webkit-backdrop-filter:blur(20px) saturate(200%) brightness(115%);';
    var nc=isDone?'#000':'#5a5a5a'; var lc=isDone?'#000':'#3a3a3a';
    calHtml+='<div style="'+st+'"><span style="font-family:Tiny5,sans-serif;font-size:32px;line-height:1;color:'+nc+'">'+(d+1)+'</span><span style="font-size:8px;font-weight:700;letter-spacing:1px;color:'+lc+'">'+(isDone?'DONE':'DAY')+'</span></div>';
  }
  calHtml+='</div>';
  if(!S.history.length){
    container.innerHTML=calHtml+'<div class="hist-empty">История пуста<br><span style="font-size:11px">Завершите тренировку,<br>чтобы данные сохранились</span></div>';
    return;
  }
  var byDay=[[],[],[]];
  S.history.slice().reverse().forEach(function(h){ if(byDay[h.dayIdx]) byDay[h.dayIdx].push(h); });
  var html=calHtml;
  S.program.forEach(function(day,di){
    if(!byDay[di].length) return;
    html+='<div class="hist-day-header">День '+day.day+'</div>';
    byDay[di].forEach(function(h){
      var d=new Date(h.date);
      var ds=d.getDate()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
      var exList=[]; day.groups.forEach(function(g){ g.exercises.forEach(function(ex){ exList.push(ex); }); });
      var pills=exList.map(function(ex){
        var w=h.weights[ex.id]; if(w===undefined) return '';
        var short=ex.name.split(' ').slice(0,3).join(' ');
        return '<div class="hist-pill"><span style="color:var(--muted);font-size:10px">'+short+'</span><span class="hw">'+w+'</span></div>';
      }).join('');
      html+='<div class="hist-entry"><div class="hist-date">'+ds+'</div><div class="hist-pills">'+pills+'</div></div>';
    });
  });
  container.innerHTML=html;
}
function clearHistory(){
  if(!confirm('Очистить всю историю?')) return;
  S.history=[]; save(); renderHistory(); showToast('История очищена');
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2200);
}

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
document.addEventListener('DOMContentLoaded',function(){
  if(window.Telegram&&window.Telegram.WebApp){
    var tg=window.Telegram.WebApp;
    try{ tg.ready(); }catch(e){}
    try{ tg.expand(); }catch(e){}
    try{ tg.disableVerticalSwipes(); }catch(e){}
    try{ tg.setHeaderColor('#0C0C0C'); }catch(e){}
    try{ tg.setBackgroundColor('#0C0C0C'); }catch(e){}
    try{ tg.setBottomBarColor('#0C0C0C'); }catch(e){}
    try{ tg.lockOrientation(); }catch(e){}
  }
  load();
  S.openPanel=null;
  bindSvgClicks();
  renderWorkout();

  document.addEventListener('click',function(e){
    if(!S.openPanel) return;
    var bar=document.getElementById('weightInputBar');
    if(bar&&bar.contains(e.target)) return;
    var allWcols=document.querySelectorAll('.weight-col');
    for(var i=0;i<allWcols.length;i++){ if(allWcols[i].contains(e.target)) return; }
    closeWib();
  });

  /* свайп для переключения дней */
  var swipeStartX=0,swipeStartY=0,swipeMoved=false;
  var workoutView=document.getElementById('view-workout');
  workoutView.addEventListener('touchstart',function(e){ swipeStartX=e.touches[0].clientX; swipeStartY=e.touches[0].clientY; swipeMoved=false; },{passive:true});
  workoutView.addEventListener('touchmove',function(e){ var dx=Math.abs(e.touches[0].clientX-swipeStartX); var dy=Math.abs(e.touches[0].clientY-swipeStartY); if(dx>dy) swipeMoved=true; },{passive:true});
  workoutView.addEventListener('touchend',function(e){
    if(!swipeMoved) return;
    var dx=e.changedTouches[0].clientX-swipeStartX;
    var dy=Math.abs(e.changedTouches[0].clientY-swipeStartY);
    if(Math.abs(dx)<60||dy>Math.abs(dx)) return;
    if(S.openPanel) return;
    var total=S.program.length;
    S.currentDay=dx<0?(S.currentDay+1)%total:(S.currentDay-1+total)%total;
    S.openPanel=null; save();
    if(window.Telegram&&window.Telegram.WebApp){ try{ window.Telegram.WebApp.HapticFeedback.impactOccurred('light'); }catch(e){} }
    showDaySvg(S.currentDay);
    renderWorkoutContent();
    updateProgress();
    window.scrollTo({top:0,behavior:'instant'});
  },{passive:true});
});
</script>
