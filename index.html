<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TrainingRPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&family=Manrope:wght@400;800&family=Geist:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- ЛОАДЕР -->
        <div id="loader" class="loader">
            <div class="bicep-emoji">💪🏻</div>
            <p class="loader-text-tiny">ЗАГРУЗКА...</p>
        </div>

        <!-- ГЛАВНЫЙ ЭКРАН (ВЫБОР ПРОГРАММЫ) -->
        <section id="home-screen" class="screen">
            <div class="rpg-logo">RPG</div>
            <p class="training-app-sub">TRAINING APP</p>
            
            <div class="main-menu">
                <div class="menu-card" onclick="showScreen('workout-screen')">
                    <div class="menu-icon">🏋️</div>
                    <div class="menu-info">
                        <div class="menu-title">Зал</div>
                        <div class="menu-subtitle">ПРОГРАММА A • B • C</div>
                    </div>
                    <div class="menu-arrow">❯</div>
                </div>
                <div class="menu-card" onclick="showSoon()">
                    <div class="menu-icon">🏊</div>
                    <div class="menu-info">
                        <div class="menu-title">Бассейн</div>
                        <div class="menu-subtitle">СКОРО...</div>
                    </div>
                    <div class="menu-arrow">❯</div>
                </div>
                <button class="btn-create-dashed" onclick="showSoon()">+ СОЗДАТЬ ТРЕНИРОВКУ</button>
            </div>
        </section>

        <!-- ЭКРАН ТРЕНИРОВКИ -->
        <section id="workout-screen" class="screen hidden">
            <header class="progress-container">
                <div class="progress-row">
                    <span id="progress-digits">0 / 0</span>
                    <div class="progress-bar-bg">
                        <div id="progress-fill"></div>
                    </div>
                </div>
            </header>

            <main class="content-scroll" id="exercise-list" onscroll="closeAllSwipes()"></main>
            
            <div class="footer-action">
                <button class="btn-finish-capsule" onclick="finishWorkout()">ЗАВЕРШИТЬ</button>
            </div>
        </section>

        <!-- ТАБ-БАР (ОСТРОВОК) -->
        <nav class="tab-island-container">
            <div class="tab-island">
                <div class="tab-item" onclick="showScreen('home-screen')">
                    <span class="tab-icon">💎</span>
                    <span class="tab-label">Тренировки</span>
                </div>
                <div class="tab-item day-trigger" onclick="openDayPicker()">
                    <span id="current-day-tab" class="tiny-day">A</span>
                    <span class="tab-label">День</span>
                </div>
                <div class="tab-item" onclick="showSoon()">
                    <span class="tab-icon">⚙️</span>
                    <span class="tab-label">Настройки</span>
                </div>
            </div>
        </nav>

        <!-- МОДАЛКА ВЫБОРА ДНЯ -->
        <div id="day-picker-overlay" class="modal-overlay hidden" onclick="closeDayPicker()">
            <div class="bottom-sheet" onclick="event.stopPropagation()">
                <div class="sheet-handle"></div>
                <div class="sheet-title">ДЕНЬ ТРЕНИРОВКИ</div>
                <div class="days-grid">
                    <div class="day-option" id="btn-day-A" onclick="changeDay('A')">
                        <span class="day-letter">A</span>
                        <span class="day-sub">ДЕНЬ A</span>
                    </div>
                    <div class="day-option" id="btn-day-B" onclick="changeDay('B')">
                        <span class="day-letter">B</span>
                        <span class="day-sub">ДЕНЬ B</span>
                    </div>
                    <div class="day-option" id="btn-day-C" onclick="changeDay('C')">
                        <span class="day-letter">C</span>
                        <span class="day-sub">ДЕНЬ C</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ЭКРАН ЗАМЕНЫ -->
        <div id="replace-screen" class="full-modal hidden">
            <div class="modal-header">
                <div class="back-btn" onclick="closeReplace()">← НАЗАД</div>
                <div class="modal-title-box">
                    <div class="modal-title">ЗАМЕНА</div>
                    <div id="replace-filter-info" class="modal-subtitle"></div>
                </div>
            </div>
            <div id="replace-list" class="modal-body"></div>
        </div>

        <!-- МОДАЛКА ФИНИША -->
        <div id="finish-modal" class="modal-overlay hidden" onclick="closeFinish()">
            <div class="modal-content finish-card" onclick="event.stopPropagation()">
                <div class="fire-emoji">🔥</div>
                <div class="done-title">ОТЛИЧНО!</div>
                <p class="done-text">Тренировка завершена.<br>Отличная работа, продолжай в том же духе!</p>
                <button class="btn-full-green" onclick="tg.close()">ОК, ЗАКРЫТЬ ПРИЛОЖЕНИЕ</button>
                <div class="back-link" onclick="closeFinish()">Главная</div>
            </div>
        </div>

        <!-- ЭКРАН ИНФО -->
        <div id="info-screen" class="full-modal hidden">
            <div class="modal-header">
                <div class="back-btn" onclick="closeInfo()">← НАЗАД</div>
                <div class="modal-title">ИНФО</div>
            </div>
            <div id="info-body" class="modal-body info-style"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
