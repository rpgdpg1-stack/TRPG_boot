<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекинг привычек с кастомными SVG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
        }

        /* Шапка с днями */
        .days-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .days-container {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Контейнер для SVG фигуры дня */
        .day-button {
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease;
            width: 90px;
            height: 90px;
        }

        .day-button:hover {
            transform: translateY(-2px);
        }

        /* SVG фигура */
        .day-button svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Заливка SVG по умолчанию */
        .day-button svg path {
            fill: #D9D9D9;
            transition: fill 0.3s ease;
        }

        /* Активный день - меняем цвет заливки */
        .day-button.active svg path {
            fill: #667eea;
        }

        /* Текст внутри кнопки */
        .day-button .day-text {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
            color: #333;
        }

        /* Активный день - увеличиваем шрифт и меняем цвет текста */
        .day-button.active .day-text {
            color: white;
            font-size: 28px !important;
            font-weight: 700;
        }

        /* Прогресс бар */
        .progress-container {
            flex: 1;
            min-width: 250px;
            position: relative;
            height: 80px;
            cursor: pointer;
        }

        /* SVG для прогресс бара (адаптируем из вашего файла) */
        .progress-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .progress-svg path {
            fill: #D9D9D9;
            transition: fill 0.3s ease;
        }

        /* Заливка прогресса */
        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            overflow: hidden;
            transition: width 0.3s ease;
        }

        .progress-fill svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .progress-fill svg path {
            fill: #667eea;
        }

        .progress-text {
            position: relative;
            z-index: 3;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #333;
            font-size: 20px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        /* Контент дня */
        .day-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: opacity 0.3s ease;
        }

        .day-content h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .day-content p {
            color: #666;
            line-height: 1.8;
            font-size: 18px;
        }

        .day-content ul {
            margin-top: 15px;
            padding-left: 20px;
            color: #666;
        }

        .day-content li {
            margin-bottom: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка с днями и прогрессом -->
        <div class="days-header">
            <div class="days-container">
                <!-- День 1 - левая фигура из SVG -->
                <div class="day-button active" data-day="1">
                    <svg viewBox="0 0 390 125" preserveAspectRatio="xMidYMid meet">
                        <path d="M129.046 50.2842C129.046 69.0406 144.295 84.2459 163.107 84.2459H357.563C368.85 84.2459 378 93.369 378 104.623C378 115.877 368.85 125 357.563 125H46.0609C27.2497 125 12 109.795 12 91.0383V45.9618C12 27.2053 27.2497 12 46.0609 12H94.9848C113.796 12 129.046 27.2053 129.046 45.9618V50.2842Z" fill="#D9D9D9"/>
                        <path d="M221.222 12H168.778C150.675 12 136 26.7746 136 45C136 63.2254 150.675 78 168.778 78H221.222C239.325 78 254 63.2254 254 45C254 26.7746 239.325 12 221.222 12Z" fill="#D9D9D9"/>
                        <path d="M345.222 12H292.778C274.675 12 260 26.7746 260 45C260 63.2254 274.675 78 292.778 78H345.222C363.325 78 378 63.2254 378 45C378 26.7746 363.325 12 345.222 12Z" fill="#D9D9D9"/>
                    </svg>
                    <span class="day-text">1</span>
                </div>

                <!-- День 2 - центральная фигура из SVG -->
                <div class="day-button" data-day="2">
                    <svg viewBox="0 0 390 126" preserveAspectRatio="xMidYMid meet">
                        <path d="M619.222 12H566.778C548.675 12 534 26.5507 534 44.5C534 62.4493 548.675 77 566.778 77H619.222C637.325 77 652 62.4493 652 44.5C652 26.5507 637.325 12 619.222 12Z" fill="#D9D9D9"/>
                        <path d="M867.222 12H814.778C796.675 12 782 26.5507 782 44.5C782 62.4493 796.675 77 814.778 77H867.222C885.325 77 900 62.4493 900 44.5C900 26.5507 885.325 12 867.222 12Z" fill="#D9D9D9"/>
                        <path d="M775.523 50.6229C775.523 69.5454 790.773 84.8852 809.584 84.8852H879.563C890.85 84.8852 900 94.089 900 105.443C900 116.796 890.85 126 879.563 126H554.437C543.15 126 534 116.796 534 105.443C534 94.089 543.15 84.8852 554.437 84.8852H624.416C643.227 84.8852 658.477 69.5454 658.477 50.6229V46.2623C658.477 27.3398 673.727 12 692.538 12H741.462C760.273 12 775.523 27.3398 775.523 46.2623V50.6229Z" fill="#D9D9D9"/>
                    </svg>
                    <span class="day-text">2</span>
                </div>

                <!-- День 3 - правая фигура из SVG -->
                <div class="day-button" data-day="3">
                    <svg viewBox="0 0 390 127" preserveAspectRatio="xMidYMid meet">
                        <path d="M1304.95 50.9617C1304.95 70.0502 1289.7 85.5246 1270.89 85.5246H1076.44C1065.15 85.5246 1056 94.8091 1056 106.262C1056 117.715 1065.15 127 1076.44 127H1387.94C1406.75 127 1422 111.526 1422 92.4372V46.5628C1422 27.4744 1406.75 12 1387.94 12H1339.02C1320.2 12 1304.95 27.4744 1304.95 46.5628V50.9617Z" fill="#D9D9D9"/>
                        <path d="M1212.78 12H1265.22C1283.32 12 1298 26.9985 1298 45.5C1298 64.0015 1283.32 79 1265.22 79H1212.78C1194.68 79 1180 64.0015 1180 45.5C1180 26.9985 1194.68 12 1212.78 12Z" fill="#D9D9D9"/>
                        <path d="M1088.78 12H1141.22C1159.32 12 1174 26.9985 1174 45.5C1174 64.0015 1159.32 79 1141.22 79H1088.78C1070.68 79 1056 64.0015 1056 45.5C1056 26.9985 1070.68 12 1088.78 12Z" fill="#D9D9D9"/>
                    </svg>
                    <span class="day-text">3</span>
                </div>
            </div>

            <!-- Прогресс бар с SVG фигурой -->
            <div class="progress-container" id="progressContainer">
                <!-- Основная фигура прогресса (серая) -->
                <div class="progress-svg">
                    <svg viewBox="0 0 390 80" preserveAspectRatio="xMidYMid meet">
                        <path d="M50 20 C50 10 60 5 70 5 L320 5 C330 5 340 10 340 20 L340 60 C340 70 330 75 320 75 L70 75 C60 75 50 70 50 60 Z" fill="#D9D9D9"/>
                        <circle cx="30" cy="40" r="15" fill="#D9D9D9"/>
                        <circle cx="360" cy="40" r="15" fill="#D9D9D9"/>
                    </svg>
                </div>
                <!-- Заливка прогресса (цветная) -->
                <div class="progress-fill" id="progressFill">
                    <svg viewBox="0 0 390 80" preserveAspectRatio="xMidYMid meet">
                        <path d="M50 20 C50 10 60 5 70 5 L320 5 C330 5 340 10 340 20 L340 60 C340 70 330 75 320 75 L70 75 C60 75 50 70 50 60 Z" fill="#667eea"/>
                        <circle cx="30" cy="40" r="15" fill="#667eea"/>
                        <circle cx="360" cy="40" r="15" fill="#667eea"/>
                    </svg>
                </div>
                <div class="progress-text" id="progressText">День 1 • 33%</div>
            </div>
        </div>

        <!-- Контент дня -->
        <div class="day-content" id="dayContent">
            <h2 id="dayTitle">День 1: Начало пути</h2>
            <p id="dayDescription">Сегодня мы начинаем наше путешествие к новой привычке. Важно сделать первый шаг и зафиксировать его.</p>
            <ul id="dayTasks">
                <li>✓ Проснуться и улыбнуться новому дню</li>
                <li>✓ Выполнить утреннюю зарядку</li>
                <li>✓ Записать свою цель на день</li>
            </ul>
        </div>
    </div>

    <script>
        // Данные для каждого дня
        const daysData = {
            1: {
                title: 'День 1: Начало пути',
                description: 'Сегодня мы начинаем наше путешествие к новой привычке. Важно сделать первый шаг и зафиксировать его.',
                tasks: [
                    '✓ Проснуться и улыбнуться новому дню',
                    '✓ Выполнить утреннюю зарядку',
                    '✓ Записать свою цель на день'
                ]
            },
            2: {
                title: 'День 2: Закрепление',
                description: 'Второй день — самый важный. Именно сейчас формируется первая нейронная связь. Не пропускайте!',
                tasks: [
                    '✓ Сделать зарядку',
                    '✓ Выпить 2 литра воды',
                    '✓ Прочитать 10 страниц книги',
                    '✓ Медитация 5 минут'
                ]
            },
            3: {
                title: 'День 3: Первые результаты',
                description: 'Вы уже на полпути к формированию привычки. Чувствуете, как становится легче?',
                tasks: [
                    '✓ Утренняя активность',
                    '✓ Здоровый завтрак',
                    '✓ Прогулка на свежем воздухе',
                    '✓ Планирование следующего дня',
                    '✓ Благодарность'
                ]
            }
        };

        // Элементы DOM
        const dayButtons = document.querySelectorAll('.day-button');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const dayTitle = document.getElementById('dayTitle');
        const dayDescription = document.getElementById('dayDescription');
        const dayTasks = document.getElementById('dayTasks');
        const progressContainer = document.getElementById('progressContainer');

        let currentDay = 1;

        // Функция обновления контента
        function updateDay(day) {
            // Обновляем активный класс
            dayButtons.forEach(btn => {
                if (btn.dataset.day == day) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Обновляем контент
            const data = daysData[day];
            dayTitle.textContent = data.title;
            dayDescription.textContent = data.description;
            
            // Обновляем список задач
            dayTasks.innerHTML = '';
            data.tasks.forEach(task => {
                const li = document.createElement('li');
                li.textContent = task;
                dayTasks.appendChild(li);
            });

            // Обновляем прогресс
            const progress = (day / 3) * 100;
            progressFill.style.width = progress + '%';
            progressText.textContent = `День ${day} • ${Math.round(progress)}%`;
        }

        // Обработчики для кнопок дней
        dayButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const day = parseInt(this.dataset.day);
                currentDay = day;
                updateDay(day);
            });
        });

        // Обработчик для прогресс бара
        progressContainer.addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const width = rect.width;
            const percentage = (x / width) * 100;
            
            // Определяем день по проценту
            let newDay = 1;
            if (percentage > 33) newDay = 2;
            if (percentage > 66) newDay = 3;
            
            if (newDay !== currentDay) {
                currentDay = newDay;
                updateDay(newDay);
            }
        });

        // Инициализация
        updateDay(1);
    </script>
</body>
</html>
