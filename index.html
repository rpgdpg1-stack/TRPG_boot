<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TrainingRPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&family=Manrope:wght@400;800&family=Geist:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="opacity: 0; background: #0d0d0d;">
    <div id="app">
        <div id="loader" class="loader">
            <div class="bicep-emoji">💪🏻</div>
            <p class="loader-text-tiny">ЗАГРУЗКА...</p>
        </div>

        <header class="sticky-header">
            <div class="header-content">
                <div class="day-selector-trigger" onclick="openDayPicker()">
                    <span id="day-display">A</span>
                    <span class="arrow-down">↓</span>
                </div>
                <div class="progress-section">
                    <span id="progress-text">0 / 0 ПРОГРЕСС</span>
                    <div class="progress-bg"><div id="progress-fill"></div></div>
                </div>
            </div>
        </header>

        <main class="content-scroll" id="main-content">
            <div id="exercise-list"></div>
            <div class="footer-padding">
                <button class="btn-finish-capsule" onclick="finishWorkout()">ЗАВЕРШИТЬ ТРЕНИРОВКУ</button>
            </div>
        </main>

        <!-- Окно выбора замены (Смена) -->
        <div id="replace-screen" class="full-modal hidden">
            <div class="modal-header">
                <div class="back-btn" onclick="closeReplace()">← НАЗАД</div>
                <div class="modal-title">ЗАМЕНА</div>
            </div>
            <div id="replace-list" class="modal-body"></div>
        </div>

        <!-- Окно Инфо -->
        <div id="info-screen" class="full-modal hidden">
            <div class="modal-header">
                <div class="back-btn" onclick="closeInfo()">← НАЗАД</div>
                <div class="modal-title">ИНФО</div>
            </div>
            <div id="info-body" class="modal-body info-style"></div>
        </div>

        <!-- Селектор дня (старая модалка снизу) -->
        <div id="day-picker-overlay" class="modal-overlay hidden" onclick="closeDayPicker()">
            <div class="bottom-sheet" onclick="event.stopPropagation()">
                <div class="sheet-handle"></div>
                <div class="days-grid">
                    <div class="day-option" onclick="changeDay('A')"><span>A</span></div>
                    <div class="day-option" onclick="changeDay('B')"><span>Б</span></div>
                    <div class="day-option" onclick="changeDay('C')"><span>C</span></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
