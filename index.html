<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💪 Тренировки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&family=Tiny5&display=swap');

:root {
–bg: #0C0C0C;
–surface: #1a1a1a;
–surface-variant: #222222;
–surface-variant-2: #2e2e2e;
–primary: #AAD066;
–primary-dim: rgba(170, 208, 102, 0.1);
–text-primary: #efefef;
–text-secondary: #b0b0b0;
–text-muted: #5a5a5a;
–border: #2a2a2a;
–border-light: rgba(255, 255, 255, 0.1);
–danger: rgba(200, 60, 60, 0.85);
–success-bg: #3C643C;
}

- {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  }

body {
background: var(–bg);
color: var(–text-primary);
font-family: ‘Manrope’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
padding-bottom: 90px;
}

/* Header */
.header {
background: transparent;
padding: 18px 0 8px;
position: sticky;
top: 0;
z-index: 100;
}

.app-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 18px;
letter-spacing: 3px;
color: #ffffff;
}

/* Day Tabs */
.day-tabs {
display: flex;
gap: 8px;
padding: 0 12px 8px;
align-items: flex-end;
}

.day-tab {
flex: 1;
height: 70px;
border-radius: 35px;
border: 1px solid var(–border-light);
background: rgba(255, 255, 255, 0.07);
backdrop-filter: blur(20px) saturate(200%) brightness(115%);
-webkit-backdrop-filter: blur(20px) saturate(200%) brightness(115%);
color: var(–text-muted);
font-family: ‘Manrope’, sans-serif;
font-size: 9px;
font-weight: 700;
cursor: pointer;
text-align: center;
transition: all 0.25s;
text-transform: uppercase;
line-height: 1;
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 0;
}

.day-tab .dn {
display: block;
font-family: ‘Tiny5’, sans-serif;
font-size: 44px;
letter-spacing: 1px;
line-height: 1;
color: var(–text-muted);
transition: color 0.25s;
}

.day-tab.active {
background: rgba(255, 255, 255, 0.07);
border: 1px solid var(–border-light);
color: var(–primary);
}

.day-tab.active .dn {
color: var(–primary);
}

/* Progress Bar */
.progress-wrap {
padding: 0 14px;
margin: 0 12px 8px;
background: rgba(255, 255, 255, 0.07);
backdrop-filter: blur(20px) saturate(200%) brightness(115%);
-webkit-backdrop-filter: blur(20px) saturate(200%) brightness(115%);
border: 1px solid var(–border-light);
border-radius: 25px;
height: 44px;
display: flex;
align-items: center;
gap: 10px;
}

.progress-label {
font-size: 10px;
font-weight: 700;
color: var(–text-muted);
white-space: nowrap;
flex-shrink: 0;
}

.progress-bg {
flex: 1;
background: rgba(255, 255, 255, 0.1);
border-radius: 6px;
height: 5px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: var(–primary);
border-radius: 6px;
transition: width 0.4s ease;
}

.progress-count {
font-size: 10px;
font-weight: 700;
color: var(–primary);
white-space: nowrap;
flex-shrink: 0;
}

/* Content */
.content {
padding: 16px 12px 0;
}

/* Muscle Group */
.muscle-group {
margin-bottom: 24px;
}

.muscle-label {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
margin-bottom: 14px;
padding: 0 4px;
text-align: center;
}

.muscle-label .dot {
width: 6px;
height: 6px;
border-radius: 50%;
background: #ffffff;
flex-shrink: 0;
}

.muscle-label span {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 16px;
letter-spacing: 3px;
color: #ffffff;
text-transform: uppercase;
}

/* Exercise Card */
.exercise-card {
background: var(–surface-variant);
border-radius: 25px;
margin-bottom: 8px;
overflow: hidden;
transition: opacity 0.25s;
}

.exercise-card.done {
opacity: 0.65;
}

.ex-main {
display: flex;
align-items: center;
padding: 8px 12px 8px 8px;
gap: 12px;
}

.ex-info {
flex: 1;
min-width: 0;
}

.ex-name {
font-size: 13px;
font-weight: 700;
line-height: 1.5;
color: var(–text-secondary);
cursor: pointer;
}

.exercise-card.done .ex-name {
text-decoration: line-through;
color: var(–text-muted);
}

.ex-sets {
font-size: 10px;
color: var(–text-muted);
margin-top: 3px;
}

.ex-right {
display: flex;
align-items: center;
gap: 8px;
flex-shrink: 0;
}

/* Weight Display */
.weight-col {
display: flex;
flex-direction: row;
align-items: center;
justify-content: center;
flex-shrink: 0;
gap: 0;
cursor: pointer;
padding: 6px;
border-radius: 15px;
transition: background 0.15s;
}

.weight-col.editing .weight-val {
border-color: var(–primary);
background: var(–primary-dim);
}

.weight-val {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 24px;
color: var(–primary);
line-height: 1;
text-align: center;
padding: 6px;
display: inline-flex;
align-items: center;
justify-content: center;
border: 2px solid transparent;
border-radius: 12px;
transition: border-color 0.2s;
}

.weight-unit {
font-size: 9px;
color: var(–text-muted);
text-transform: uppercase;
letter-spacing: 1px;
font-weight: 600;
margin-left: 3px;
}

/* Checkbox */
.ex-check {
width: 36px;
height: 36px;
border-radius: 15px;
border: 2px solid #3a3a3a;
background: transparent;
cursor: pointer;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
font-size: 14px;
color: transparent;
font-weight: 400;
font-family: Arial, sans-serif;
}

.exercise-card.done .ex-check {
background: var(–primary);
border-color: #5a5a5a;
color: var(–on-primary);
}

/* Exercise Image */
.ex-img {
width: 120px;
height: 120px;
border-radius: 17px;
overflow: hidden;
flex-shrink: 0;
background: var(–surface-variant-2);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
}

.ex-img img {
width: 120px;
height: 120px;
object-fit: contain;
border-radius: 17px;
display: block;
}

.ex-img svg {
width: 36px;
height: 36px;
stroke: var(–text-muted);
stroke-width: 1.5;
fill: none;
}

/* Weight Input Bar */
.weight-input-bar {
display: none;
position: fixed;
left: 12px;
right: 12px;
bottom: 18px;
z-index: 1000;
background: rgba(255, 255, 255, 0.07);
backdrop-filter: blur(20px) saturate(200%) brightness(115%);
-webkit-backdrop-filter: blur(20px) saturate(200%) brightness(115%);
border: 1px solid var(–border-light);
border-radius: 25px;
padding: 10px 16px;
align-items: center;
gap: 12px;
box-shadow: 0 4px 32px rgba(0, 0, 0, 0.6);
}

.weight-input-bar.open {
display: flex;
}

.wib-label {
font-size: 11px;
color: var(–text-muted);
flex: 1;
line-height: 1.4;
font-weight: 600;
}

.wib-label b {
display: block;
color: var(–text-primary);
font-size: 12px;
margin-bottom: 1px;
}

.wib-kg {
font-size: 10px;
color: var(–text-muted);
font-weight: 600;
letter-spacing: 1px;
text-transform: uppercase;
}

.wib-input {
background: var(–surface-variant-2);
border: 2px solid var(–primary);
border-radius: 17px;
color: var(–primary);
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
text-align: center;
padding: 8px 12px;
outline: none;
width: 110px;
flex-shrink: 0;
}

/* Image Overlay */
.img-expand-overlay {
display: none;
position: fixed;
inset: 0;
z-index: 400;
background: rgba(0, 0, 0, 0.85);
align-items: center;
justify-content: center;
}

.img-expand-overlay.open {
display: flex;
}

.img-expand-inner {
width: 88vw;
max-width: 380px;
border-radius: 25px;
overflow: hidden;
background: var(–surface);
padding: 10px;
box-shadow: 0 24px 64px rgba(0, 0, 0, 0.9);
}

.img-expand-inner img {
width: 100%;
height: auto;
display: block;
border-radius: 15px;
}

/* Done Banner */
.done-banner {
display: none;
background: linear-gradient(135deg, var(–primary-dim), rgba(170, 208, 102, 0.02));
border: 1px solid rgba(170, 208, 102, 0.25);
border-radius: 25px;
padding: 16px;
margin: 0 0 16px;
text-align: center;
}

.done-banner.show {
display: block;
}

.done-banner .db-emoji {
font-size: 32px;
margin-bottom: 6px;
}

.done-banner .db-text {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 18px;
letter-spacing: 2px;
color: var(–primary);
}

.done-banner .db-sub {
font-size: 11px;
color: var(–text-muted);
margin-top: 4px;
}

/* Finish Button */
.finish-btn {
display: block;
width: 100%;
padding: 14px 16px;
border-radius: 25px;
background: var(–danger);
backdrop-filter: blur(20px) saturate(200%) brightness(115%);
-webkit-backdrop-filter: blur(20px) saturate(200%) brightness(115%);
border: 1px solid rgba(255, 120, 120, 0.25);
color: #fff;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 2px;
cursor: pointer;
transition: opacity 0.2s;
text-align: center;
}

.finish-btn:active {
opacity: 0.7;
}

/* Modal */
.overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0, 0, 0, 0.8);
z-index: 500;
align-items: flex-end;
justify-content: center;
}

.overlay.open {
display: flex;
}

.modal {
background: rgba(26, 26, 26, 0.85);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-radius: 20px 20px 0 0;
padding: 20px 18px 40px;
width: 100%;
max-width: 480px;
border-top: 1px solid rgba(255, 255, 255, 0.08);
}

.modal-handle {
width: 36px;
height: 4px;
background: var(–border);
border-radius: 2px;
margin: 0 auto 18px;
}

.modal-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 1px;
margin-bottom: 14px;
color: var(–primary);
}

.modal-label {
font-size: 10px;
color: var(–text-muted);
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 5px;
font-weight: 700;
}

.modal-input {
width: 100%;
background: var(–surface-variant-2);
border: 1.5px solid var(–border);
border-radius: 10px;
color: var(–text-primary);
font-family: ‘Manrope’, sans-serif;
font-size: 13px;
padding: 10px 12px;
outline: none;
resize: none;
line-height: 1.5;
transition: border-color 0.2s;
margin-bottom: 12px;
}

.modal-input:focus {
border-color: var(–primary);
}

.modal-row {
display: flex;
gap: 8px;
margin-bottom: 16px;
}

.modal-row > div {
flex: 1;
}

.modal-btns {
display: flex;
gap: 8px;
}

.btn-save {
flex: 1;
padding: 13px;
border-radius: 10px;
background: var(–primary);
border: none;
color: var(–on-primary);
font-family: ‘Manrope’, sans-serif;
font-weight: 800;
font-size: 13px;
cursor: pointer;
transition: opacity 0.2s;
}

.btn-save:active {
opacity: 0.8;
}

.btn-cancel {
padding: 13px 18px;
border-radius: 10px;
background: var(–surface-variant-2);
border: 1px solid var(–border);
color: var(–text-muted);
font-family: ‘Manrope’, sans-serif;
font-weight: 600;
font-size: 13px;
cursor: pointer;
}

/* History */
.hist-content {
padding: 16px 12px;
}

.hist-day-header {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 18px;
letter-spacing: 1px;
color: var(–primary);
margin: 16px 0 8px;
display: flex;
align-items: center;
gap: 8px;
}

.hist-entry {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 12px 14px;
margin-bottom: 8px;
}

.hist-date {
font-size: 10px;
color: var(–text-muted);
font-weight: 600;
margin-bottom: 8px;
text-transform: uppercase;
letter-spacing: 0.5px;
}

.hist-pills {
display: flex;
flex-wrap: wrap;
gap: 5px;
}

.hist-pill {
background: var(–surface-variant-2);
border-radius: 8px;
padding: 4px 9px;
font-size: 11px;
color: var(–text-primary);
display: flex;
gap: 5px;
align-items: center;
font-weight: 500;
}

.hist-pill .hw {
color: var(–primary);
font-weight: 800;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 14px;
line-height: 1;
}

.hist-empty {
color: var(–text-muted);
font-size: 13px;
text-align: center;
padding: 40px 20px;
line-height: 1.8;
}

/* Bottom Navigation */
.bottom-nav {
position: fixed;
bottom: 18px;
left: 0;
right: 0;
background: transparent;
display: flex;
z-index: 200;
padding: 0 12px;
gap: 12px;
justify-content: space-between;
}

.nav-btn {
flex: 1;
max-width: 120px;
height: 70px;
padding: 0 8px;
background: rgba(255, 255, 255, 0.07);
backdrop-filter: blur(20px) saturate(200%) brightness(115%);
-webkit-backdrop-filter: blur(20px) saturate(200%) brightness(115%);
border: 1px solid var(–border-light);
border-radius: 35px;
color: var(–text-muted);
cursor: pointer;
font-family: ‘Manrope’, sans-serif;
font-size: 9px;
text-transform: uppercase;
letter-spacing: 0.5px;
font-weight: 700;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 4px;
transition: all 0.2s;
}

.nav-btn.active {
color: var(–primary);
}

.nav-btn svg {
width: 20px;
height: 20px;
stroke-width: 2;
}

/* Views */
.view {
display: none;
}

.view.active {
display: block;
}

/* Toast */
.toast {
position: fixed;
bottom: 100px;
left: 50%;
transform: translateX(-50%) translateY(16px);
background: var(–success-bg);
color: var(–on-primary);
padding: 9px 18px;
border-radius: 20px;
font-size: 12px;
font-weight: 800;
opacity: 0;
transition: all 0.3s;
z-index: 900;
pointer-events: none;
white-space: nowrap;
font-family: ‘Manrope’, sans-serif;
}

.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}

/* Responsive */
@media (max-width: 380px) {
.ex-img {
width: 90px;
height: 90px;
}

.weight-val {
font-size: 20px;
}

.day-tab .dn {
font-size: 36px;
}
}
</style>

</head>
<body>

<div class="toast" id="toast"></div>

<div class="weight-input-bar" id="weightInputBar">
  <div class="wib-label">
    <b id="wibExName"></b>
    <span class="wib-kg">кг</span>
  </div>
  <input class="wib-input" type="text" id="wibInput" inputmode="decimal"
    onkeydown="onWibKeydown(event)"
    oninput="onWibInput(this.value)"
    onchange="onWibInput(this.value)"
    onblur="onWibBlur()">
</div>

<div class="img-expand-overlay" id="imgOverlay" onclick="closeImgOverlay()">
  <div class="img-expand-inner" onclick="event.stopPropagation()">
    <img id="imgOverlayImg" src="" alt="">
  </div>
</div>

<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Изменить упражнение</div>
    <div class="modal-label">Название</div>
    <textarea class="modal-input" id="editName" rows="2"></textarea>
    <div class="modal-row">
      <div>
        <div class="modal-label">Подходы</div>
        <input class="modal-input" type="number" id="editSets" min="1" max="10" style="margin-bottom:0">
      </div>
      <div>
        <div class="modal-label">Повторения</div>
        <input class="modal-input" type="number" id="editReps" min="1" max="100" style="margin-bottom:0">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveEdit()">Сохранить</button>
    </div>
  </div>
</div>

<div class="view active" id="view-workout">
  <div class="header">
    <div class="day-tabs" id="dayTabs"></div>
    <div class="progress-wrap" id="progressWrap">
      <span class="progress-label">Прогресс</span>
      <div class="progress-bg">
        <div class="progress-fill" id="progBar" style="width:0%"></div>
      </div>
      <span class="progress-count" id="progLabel">0/0</span>
    </div>
  </div>
  <div class="content" id="workoutContent"></div>
</div>

<div class="view" id="view-history">
  <div class="header">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px">
      <div class="app-title">📊 ИСТОРИЯ</div>
      <button onclick="clearHistory()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text-muted);font-size:10px;cursor:pointer;font-family:Manrope,sans-serif;font-weight:700">Очистить</button>
    </div>
  </div>
  <div class="hist-content" id="histContent"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-workout" onclick="switchView('workout')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M6 4v16M18 4v16M6 12h12M3 8h3M18 8h3M3 16h3M18 16h3"/>
    </svg>
    Тренировка
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchView('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    История
  </button>
</nav>

<script>
const STORAGE_KEY = 'gym_v5';

const IMGS = {

  d3_1: null, d3_2: null, d3_3: null, d3_4: null, d3_5: null, d3_6: null, d3_7: null, d3_8: null, d3_9: null

  { day:2, label:"DAY\n2", groups:[

const DEFAULT_WEIGHTS = {
  d1_1:0, d1_2:0, d1_3:0, d1_4:0, d1_5:0, d1_6:0, d1_7:0, d1_8:0, d1_9:0,
  d2_1:0, d2_2:0, d2_3:0, d2_4:0, d2_5:0, d2_6:0, d2_7:0, d2_8:0, d2_9:0,
  d3_1:0, d3_2:0, d3_3:0, d3_4:0, d3_5:0, d3_6:0, d3_7:0, d3_8:0, d3_9:0
};

const State = {
  currentDay: 0,
  step: 2.5,
  program: null,
  weights: {},
  done: {},
  history: [],
  openPanel: null,
  editTarget: null
};

function hapticLight() {
  if (window.Telegram?.WebApp?.HapticFeedback) {
    try { window.Telegram.WebApp.HapticFeedback.impactOccurred('light'); } catch(e) {}
  }
}

function hapticSuccess() {
  if (window.Telegram?.WebApp?.HapticFeedback) {
    try { window.Telegram.WebApp.HapticFeedback.notificationOccurred('success'); } catch(e) {}
  }
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.assign(State, parsed);
    }
  } catch(e) {}
  
  if (!State.program) State.program = JSON.parse(JSON.stringify(DEFAULT_PROGRAM));
  if (!State.weights || !Object.keys(State.weights).length) State.weights = { ...DEFAULT_WEIGHTS };
  if (!State.history) State.history = [];
  if (!State.done) State.done = {};
  if (!State.step) State.step = 2.5;
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(State));
  } catch(e) {}
  cloudSave();
}

function cloudSave() {
  if (!window.Telegram?.WebApp?.CloudStorage) return;
  try {
    const data = JSON.stringify({ weights: State.weights, history: State.history, program: State.program });
    window.Telegram.WebApp.CloudStorage.setItem(CLOUD_KEY, data, () => {});
  } catch(e) {}
}

function cloudLoad(callback) {
  if (!window.Telegram?.WebApp?.CloudStorage) { callback(); return; }
  try {
    window.Telegram.WebApp.CloudStorage.getItem(CLOUD_KEY, (err, val) => {
      if (!err && val) {
        try {
          const remote = JSON.parse(val);
          if (remote.history?.length > (State.history || []).length) State.history = remote.history;
          if (remote.weights) State.weights = { ...remote.weights, ...State.weights };
          if (remote.program) State.program = remote.program;
          saveState();
        } catch(e) {}
      }
      callback();
    });
  } catch(e) { callback(); }
}

function renderDayTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = '';
  
  State.program.forEach((day, i) => {
    const tab = document.createElement('button');
    tab.className = `day-tab${i === State.currentDay ? ' active' : ''}`;
    tab.innerHTML = `<span class="dn">${day.day}</span>`;
    tab.onclick = () => {
      hapticLight();
      State.currentDay = i;
      State.openPanel = null;
      saveState();
      renderWorkout();
      window.scrollTo({ top: 0, behavior: 'instant' });
    };
    container.appendChild(tab);
  });
}

function renderWorkout() {
  renderDayTabs();
  
  const day = State.program[State.currentDay];
  const allIds = [];
  day.groups.forEach(g => g.exercises.forEach(e => allIds.push(e.id)));
  
  const doneCount = allIds.filter(id => State.done[id]).length;
  const total = allIds.length;
  
  document.getElementById('progLabel').textContent = `${doneCount}/${total}`;
  document.getElementById('progBar').style.width = total ? Math.round(doneCount / total * 100) + '%' : '0%';
  
  const allDone = doneCount === total && total > 0;
  
  const container = document.getElementById('workoutContent');
  container.innerHTML = '';
  
  day.groups.forEach((group, gi) => {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'muscle-group';
    
    groupDiv.innerHTML = `
      <div class="muscle-label">
        <div class="dot"></div>
        <span>${group.name}</span>
      </div>
    `;
    
    group.exercises.forEach((ex, ei) => {
      const isDone = !!State.done[ex.id];
      const weight = State.weights[ex.id] ?? 0;
      const isOpen = State.openPanel === ex.id;
      const imgSrc = IMGS[ex.id];
      
      const imgInner = imgSrc
        ? `<img src="${imgSrc}" alt="">`
        : '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 15l5-5 4 4 3-3 6 6"/><circle cx="8.5" cy="8.5" r="1.5"/></svg>';
      
      const card = document.createElement('div');
      card.className = `exercise-card${isDone ? ' done' : ''}`;
      card.dataset.id = ex.id;
      
      card.innerHTML = `
        <div class="ex-main">
          <div class="ex-img" data-id="${ex.id}">${imgInner}</div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sets">${ex.sets}x${ex.reps}</div>
          </div>
          <div class="ex-right">
            <div class="weight-col${isOpen ? ' editing' : ''}" data-id="${ex.id}">
              <div class="weight-val" data-id="${ex.id}">${weight}</div>
              <div class="weight-unit">кг</div>
            </div>
            <div class="ex-check" data-id="${ex.id}">
              ${isDone ? '<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
            </div>
          </div>
        </div>
      `;
      
      groupDiv.appendChild(card);
    });
    
    container.appendChild(groupDiv);
  });
  
  const bottomDiv = document.createElement('div');
  bottomDiv.style.padding = '8px 0 110px';
  
  const banner = document.createElement('div');
  banner.className = `done-banner${allDone ? ' show' : ''}`;
  banner.innerHTML = `
    <div class="db-emoji">🔥</div>
    <div class="db-text">Тренировка завершена!</div>
    <div class="db-sub">Все упражнения выполнены</div>
  `;
  bottomDiv.appendChild(banner);
  
  const finishBtn = document.createElement('button');
  finishBtn.className = 'finish-btn';
  finishBtn.innerHTML = '✓ ЗАВЕРШИТЬ ТРЕНИРОВКУ';
  finishBtn.onclick = finishWorkout;
  bottomDiv.appendChild(finishBtn);
  
  container.appendChild(bottomDiv);
}

let touchStart = { x: 0, y: 0, handled: false };

function onWeightClick(id) {
  if (touchStart.handled) {
    touchStart.handled = false;
    return;
  }
  toggleWeightPanel(id);
}

function touchStartWeight(e, id) {
  touchStart.x = e.touches[0].clientX;
  touchStart.y = e.touches[0].clientY;
  touchStart.handled = false;
}

function touchEndWeight(e, id) {
  const dy = Math.abs(e.changedTouches[0].clientY - touchStart.y);
  const dx = Math.abs(e.changedTouches[0].clientX - touchStart.x);
  
  if (dy > 8 || dx > 8) return;
  
  e.preventDefault();
  touchStart.handled = true;
  toggleWeightPanel(id);
}

function toggleWeightPanel(id) {
  if (State.openPanel === id) {
    closeWeightPanel();
    return;
  }
  
  if (State.openPanel) {
    document.querySelectorAll('.weight-col.editing').forEach(el => el.classList.remove('editing'));
    State.openPanel = id;
    saveState();
    
    const wcol = document.querySelector(`.weight-col[data-id="${id}"]`);
    if (wcol) wcol.classList.add('editing');
    
    const day = State.program[State.currentDay];
    let exName = '';
    day.groups.forEach(g => {
      g.exercises.forEach(e => {
        if (e.id === id) exName = e.name;
      });
    });
    
    const weight = State.weights[id] ?? 0;
    document.getElementById('wibExName').textContent = exName.length > 30 ? exName.slice(0, 30) + '...' : exName;
    document.getElementById('wibInput').value = weight;
    return;
  }
  
  State.openPanel = id;
  saveState();
  
  document.querySelector('.bottom-nav').style.display = 'none';
  
  const wcol = document.querySelector(`.weight-col[data-id="${id}"]`);
  if (wcol) wcol.classList.add('editing');
  
  const day = State.program[State.currentDay];
  let exName = '';
  day.groups.forEach(g => {
    g.exercises.forEach(e => {
      if (e.id === id) exName = e.name;
    });
  });
  
  const weight = State.weights[id] ?? 0;
  
  document.getElementById('wibExName').textContent = exName.length > 30 ? exName.slice(0, 30) + '...' : exName;
  const input = document.getElementById('wibInput');
  input.value = weight;
  
  const bar = document.getElementById('weightInputBar');
  bar.style.bottom = '18px';
  bar.classList.add('open');
  
  function onViewportResize() {
    const vv = window.visualViewport;
    const kbHeight = window.innerHeight - vv.height;
    bar.style.bottom = (kbHeight > 50 ? kbHeight + 4 : 18) + 'px';
  }
  
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', onViewportResize);
    window._wibResizeHandler = onViewportResize;
    onViewportResize();
  }
  
  input.focus();
  try { input.setSelectionRange(input.value.length, input.value.length); } catch(e) {}
}

function closeWeightPanel() {
  State.openPanel = null;
  saveState();
  
  if (window._wibResizeHandler && window.visualViewport) {
    window.visualViewport.removeEventListener('resize', window._wibResizeHandler);
    window._wibResizeHandler = null;
  }
  
  document.getElementById('wibInput').blur();
  
  const bar = document.getElementById('weightInputBar');
  bar.classList.remove('open');
  bar.style.bottom = '18px';
  
  document.querySelectorAll('.weight-col.editing').forEach(el => el.classList.remove('editing'));
  document.querySelector('.bottom-nav').style.display = 'flex';
}

function onWibInput(value) {
  if (!State.openPanel) return;
  
  const cleaned = String(value).replace(',', '.');
  const num = parseFloat(cleaned) || 0;
  
  const valEl = document.querySelector(`.weight-val[data-id="${State.openPanel}"]`);
  if (valEl) {
    valEl.textContent = cleaned.endsWith('.') ? cleaned : num;
  }
  
  State.weights[State.openPanel] = Math.max(0, num);
  saveState();
}

function onWibKeydown(e) {
  if (e.key === 'Enter') {
    closeWeightPanel();
    return;
  }
}

function onWibBlur() {
  setTimeout(() => {
    if (State.openPanel) closeWeightPanel();
  }, 150);
}

function toggleDone(id) {
  if (State.openPanel) closeWeightPanel();
  
  State.done[id] = !State.done[id];
  hapticLight();
  saveState();
  renderWorkout();
}

function tapImg(id) {
  const animSrc = IMGS_ANIM[id];
  if (!animSrc) return;
  
  const img = document.getElementById('imgOverlayImg');
  img.src = animSrc + '?t=' + Date.now();
  document.getElementById('imgOverlay').classList.add('open');
}

function closeImgOverlay() {
  document.getElementById('imgOverlay').classList.remove('open');
  setTimeout(() => {
    document.getElementById('imgOverlayImg').src = '';
  }, 300);
}

function openEdit(di, gi, ei) {
  State.editTarget = { di, gi, ei };
  const ex = State.program[di].groups[gi].exercises[ei];
  
  document.getElementById('editName').value = ex.name;
  document.getElementById('editSets').value = ex.sets;
  document.getElementById('editReps').value = ex.reps;
  document.getElementById('editOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('editOverlay').classList.remove('open');
  State.editTarget = null;
}

function saveEdit() {
  if (!State.editTarget) return;
  
  const { di, gi, ei } = State.editTarget;
  const ex = State.program[di].groups[gi].exercises[ei];
  
  const name = document.getElementById('editName').value.trim();
  if (name) ex.name = name;
  
  const sets = parseInt(document.getElementById('editSets').value);
  if (!isNaN(sets)) ex.sets = sets;
  
  const reps = parseInt(document.getElementById('editReps').value);
  if (!isNaN(reps)) ex.reps = reps;
  
  saveState();
  closeModal();
  showToast('Сохранено');
  renderWorkout();
}

function finishWorkout() {
  hapticSuccess();
  
  const day = State.program[State.currentDay];
  const allIds = [];
  day.groups.forEach(g => g.exercises.forEach(e => allIds.push(e.id)));
  
  const snapshot = {};
  allIds.forEach(id => {
    snapshot[id] = State.weights[id] ?? 0;
  });
  
  State.history.push({
    date: Date.now(),
    dayIdx: State.currentDay,
    weights: snapshot
  });
  
  allIds.forEach(id => delete State.done[id]);
  
  saveState();
  showToast(`Тренировка дня ${State.currentDay + 1} сохранена!`);
  window.scrollTo({ top: 0, behavior: 'instant' });
  renderWorkout();
}

function renderHistory() {
  const container = document.getElementById('histContent');
  
  const trainedDays = [false, false, false];
  const tempDone = [false, false, false];
  
  State.history.forEach(h => {
    if (h.dayIdx >= 0 && h.dayIdx < 3) {
      tempDone[h.dayIdx] = true;
      if (tempDone[0] && tempDone[1] && tempDone[2]) {
        tempDone.fill(false);
      }
    }
  });
  
  trainedDays.forEach((_, i) => {
    trainedDays[i] = tempDone[i];
  });
  
  let html = '<div style="display:flex;gap:12px;margin-bottom:20px;padding:0 4px;justify-content:center">';
  
  for (let d = 0; d < 3; d++) {
    const isDone = trainedDays[d];
    const style = isDone
      ? 'flex:1;max-width:100px;aspect-ratio:1/1;border-radius:25px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:#AAD066;border:1.5px solid #AAD066;'
      : 'flex:1;max-width:100px;aspect-ratio:1/1;border-radius:25px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:rgba(255,255,255,0.09);border:1.5px solid rgba(255,255,255,0.18);backdrop-filter:blur(20px) saturate(200%) brightness(115%);';
    
    const numColor = isDone ? '#000' : '#5a5a5a';
    const labelColor = isDone ? '#000' : '#3a3a3a';
    const label = isDone ? 'DONE' : 'DAY';
    
    html += `<div style="${style}">
      <span style="font-family:Tiny5,sans-serif;font-size:32px;line-height:1;color:${numColor}">${d + 1}</span>
      <span style="font-size:8px;font-weight:700;letter-spacing:1px;color:${labelColor}">${label}</span>
    </div>`;
  }
  
  html += '</div>';
  
  if (!State.history.length) {
    container.innerHTML = html + '<div class="hist-empty">История пуста<br><span style="font-size:11px">Завершите тренировку,<br>чтобы данные сохранились</span></div>';
    return;
  }
  
  const byDay = [[], [], []];
  const reversed = [...State.history].reverse();
  
  reversed.forEach(h => {
    if (byDay[h.dayIdx]) byDay[h.dayIdx].push(h);
  });
  
  State.program.forEach((day, di) => {
    const entries = byDay[di];
    if (!entries?.length) return;
    
    html += `<div class="hist-day-header">День ${day.day}</div>`;
    
    entries.forEach(h => {
      const date = new Date(h.date);
      const dateStr = `${date.getDate()}.${String(date.getMonth() + 1).padStart(2, '0')}.${date.getFullYear()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
      
      const exercises = [];
      day.groups.forEach(g => g.exercises.forEach(ex => exercises.push(ex)));
      
      const pills = exercises.map(ex => {
        const w = h.weights[ex.id];
        if (w === undefined) return '';
        const short = ex.name.split(' ').slice(0, 3).join(' ');
        return `<div class="hist-pill"><span style="color:var(--text-muted);font-size:10px">${short}</span><span class="hw">${w}</span></div>`;
      }).join('');
      
      html += `<div class="hist-entry"><div class="hist-date">${dateStr}</div><div class="hist-pills">${pills}</div></div>`;
    });
  });
  
  container.innerHTML = html;
}

function clearHistory() {
  if (!confirm('Очистить всю историю?')) return;
  State.history = [];
  saveState();
  renderHistory();
  showToast('История очищена');
}

function switchView(view) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));

function showToast(msg) {

function initTelegram() {

function setupEventDelegation() {
  const workoutView = document.getElementById('view-workout');
  
  workoutView.addEventListener('click', (e) => {
    const img = e.target.closest('.ex-img');
    if (img && img.dataset.id) {
      tapImg(img.dataset.id);
      return;
    }
    
    const weightCol = e.target.closest('.weight-col');
    if (weightCol && weightCol.dataset.id) {
      onWeightClick(weightCol.dataset.id);
      return;
    }
    
    const check = e.target.closest('.ex-check');
    if (check && check.dataset.id) {
      toggleDone(check.dataset.id);
      return;
    }
  });
  
  workoutView.addEventListener('contextmenu', (e) => {
    const name = e.target.closest('.ex-name');
    if (name) {
      e.preventDefault();
      
      const card = e.target.closest('.exercise-card');
      if (card) {
        const exId = card.dataset.id;
        let found = false;
        
        State.program[State.currentDay].groups.forEach((group, gi) => {
          group.exercises.forEach((ex, ei) => {
            if (ex.id === exId && !found) {
              openEdit(State.currentDay, gi, ei);
              found = true;
            }
          });
        });
      }
    }
  });
  
  workoutView.addEventListener('touchstart', (e) => {
    const weightCol = e.target.closest('.weight-col');
    if (weightCol && weightCol.dataset.id) {
      touchStartWeight(e, weightCol.dataset.id);
    }
  }, { passive: true });
  
  workoutView.addEventListener('touchend', (e) => {
    const weightCol = e.target.closest('.weight-col');
    if (weightCol && weightCol.dataset.id) {
      touchEndWeight(e, weightCol.dataset.id);
    }
  });
  
  let swipeStart = { x: 0, y: 0, moved: false };
  
  workoutView.addEventListener('touchstart', (e) => {
    swipeStart.x = e.touches[0].clientX;
    swipeStart.y = e.touches[0].clientY;
    swipeStart.moved = false;
  }, { passive: true });
  
  workoutView.addEventListener('touchmove', (e) => {
    const dx = Math.abs(e.touches[0].clientX - swipeStart.x);
    const dy = Math.abs(e.touches[0].clientY - swipeStart.y);
    if (dx > dy) swipeStart.moved = true;
  }, { passive: true });
  
  workoutView.addEventListener('touchend', (e) => {
    if (!swipeStart.moved || State.openPanel) return;
    
    const dx = e.changedTouches[0].clientX - swipeStart.x;
    const dy = Math.abs(e.changedTouches[0].clientY - swipeStart.y);
    
    if (Math.abs(dx) < 60 || dy > Math.abs(dx)) return;
    
    const total = State.program.length;
    if (dx < 0) {
      State.currentDay = (State.currentDay + 1) % total;
    } else {
      State.currentDay = (State.currentDay - 1 + total) % total;
    }
    
    State.openPanel = null;
    saveState();
    hapticLight();
    renderWorkout();
    window.scrollTo({ top: 0, behavior: 'instant' });
  });
  
  document.addEventListener('click', (e) => {
    if (!State.openPanel) return;
    
    const bar = document.getElementById('weightInputBar');
    if (bar?.contains(e.target)) return;
    
    if (e.target.closest('.weight-col')) return;
    
    closeWeightPanel();
  });
}

document.addEventListener('DOMContentLoaded', () => {
  initTelegram();
  loadState();
  setupEventDelegation();
  
  cloudLoad(() => {
    renderWorkout();
  });
});
</script>

</body>
</html>
