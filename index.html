<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💪 Тренировки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&family=Tiny5&display=swap');
:root {
  --bg:#0f0f0f; --card:#1a1a1a; --card2:#242424;
  --accent:#9DC44A; --accent-dim:rgba(157,196,74,0.1);
  --text:#efefef; --muted:#5a5a5a; --border:#2a2a2a;
  --green:#3C643C;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:90px}
.header{background:transparent;padding:16px 16px 0;position:sticky;top:0;z-index:100;border-bottom:none}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:48px;background:linear-gradient(to bottom,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0) 100%);pointer-events:none;z-index:-1}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:#ffffff}
.stats-pill{background:rgba(36,36,36,0.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.stats-pill b{color:var(--accent);font-size:13px}
.day-tabs{display:flex;gap:12px;padding-bottom:10px;background:transparent;justify-content:center}
.day-tab{flex:1;padding:10px 8px;border-radius:25px;border:1.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.09);backdrop-filter:blur(20px) saturate(200%) brightness(115%);-webkit-backdrop-filter:blur(20px) saturate(200%) brightness(115%);color:var(--muted);font-family:'Manrope',sans-serif;font-size:9px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;text-transform:uppercase;line-height:1.4}
.day-tab .dn{display:block;font-family:'Tiny5',sans-serif;font-size:44px;letter-spacing:1px;margin-bottom:0;line-height:1}
.day-tab.active{background:var(--accent);border-color:var(--accent);color:#000}
.progress-wrap{padding:8px 12px 10px;margin:6px 0 4px;background:rgba(255,255,255,0.07);backdrop-filter:blur(20px) saturate(200%) brightness(115%);-webkit-backdrop-filter:blur(20px) saturate(200%) brightness(115%);border:1px solid rgba(255,255,255,0.18);border-radius:25px}
.progress-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px;color:var(--muted)}
.progress-row b{color:var(--accent)}
.progress-bg{background:var(--card2);border-radius:4px;height:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s ease}
.content{padding:16px 12px 0}
.muscle-group{margin-bottom:24px}
.muscle-label{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;padding:0 4px;text-align:center}
.muscle-label .dot{width:6px;height:6px;border-radius:50%;background:#ffffff;flex-shrink:0}
.muscle-label span{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:#ffffff;text-transform:uppercase}
.exercise-card{background:rgba(26,26,26,0.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.07);border-radius:25px;margin-bottom:8px;overflow:hidden;transition:border-color .25s,opacity .25s}
.exercise-card.done{border-color:#3a3a3a;opacity:.65}
.ex-main{display:flex;align-items:center;padding:8px 10px;gap:12px}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:12.5px;font-weight:700;line-height:1.4;color:#b0b0b0;cursor:pointer}
.exercise-card.done .ex-name{text-decoration:line-through;color:var(--muted)}
.ex-sets{font-size:10px;color:var(--muted);margin-top:3px}
.ex-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.weight-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;gap:1px;cursor:pointer;padding:6px 10px;border-radius:15px;transition:background .15s,border-color .15s;min-width:52px;border:2px solid transparent}
.weight-col.editing{border-color:var(--accent);background:var(--accent-dim)}
.weight-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);line-height:1;text-align:center}
.weight-unit{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.ex-check{width:36px;height:36px;border-radius:15px;border:2px solid #3a3a3a;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:14px;color:transparent;font-weight:400;font-family:Arial,sans-serif}
.exercise-card.done .ex-check{background:var(--accent);border-color:#5a5a5a;color:#000}
.ex-img{width:120px;height:120px;border-radius:17px;overflow:hidden;flex-shrink:0;background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.ex-img img{width:120px;height:120px;object-fit:contain;border-radius:17px;display:block}
.ex-img svg{width:36px;height:36px;stroke:var(--muted);stroke-width:1.5;fill:none}
.weight-input-bar{display:none;position:fixed;left:12px;right:12px;bottom:12px;z-index:300;background:rgba(255,255,255,0.09);backdrop-filter:blur(20px) saturate(200%) brightness(115%);-webkit-backdrop-filter:blur(20px) saturate(200%) brightness(115%);border:1px solid rgba(255,255,255,0.18);border-radius:25px;padding:10px 16px;align-items:center;gap:12px;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.weight-input-bar.open{display:flex}
.wib-label{font-size:11px;color:var(--muted);flex:1;line-height:1.4;font-weight:600}
.wib-label b{display:block;color:var(--text);font-size:12px;margin-bottom:1px}
.wib-input{background:var(--card2);border:2px solid var(--accent);border-radius:17px;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:28px;text-align:center;padding:8px 12px;outline:none;width:110px;flex-shrink:0}
.wib-done{width:40px;height:40px;border-radius:17px;background:var(--accent);border:none;color:#000;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.img-expand-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.85);align-items:center;justify-content:center}
.img-expand-overlay.open{display:flex}
.img-expand-inner{width:88vw;max-width:380px;border-radius:25px;overflow:hidden;background:var(--card);padding:10px;box-shadow:0 24px 64px rgba(0,0,0,.9)}
.img-expand-inner img{width:100%;height:auto;display:block;border-radius:15px}
.done-banner{display:none;background:linear-gradient(135deg,rgba(157,196,74,.08),rgba(157,196,74,.02));border:1px solid rgba(157,196,74,.25);border-radius:25px;padding:16px;margin:0 12px 16px;text-align:center}
.done-banner.show{display:block}
.done-banner .db-emoji{font-size:32px;margin-bottom:6px}
.done-banner .db-text{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent)}
.done-banner .db-sub{font-size:11px;color:var(--muted);margin-top:4px}
.finish-btn{display:none;margin:0 12px 16px;width:calc(100% - 24px);padding:15px;border-radius:25px;background:var(--accent);border:none;color:#000;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;transition:opacity .2s}
.finish-btn.show{display:block}
.finish-btn:active{opacity:.8}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:rgba(26,26,26,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%;max-width:480px;border-top:1px solid rgba(255,255,255,0.08)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:14px;color:var(--accent)}
.modal-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:700}
.modal-input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Manrope',sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:none;line-height:1.5;transition:border-color .2s;margin-bottom:12px}
.modal-input:focus{border-color:var(--accent)}
.modal-row{display:flex;gap:8px;margin-bottom:16px}
.modal-row>div{flex:1}
.modal-btns{display:flex;gap:8px}
.btn-save{flex:1;padding:13px;border-radius:10px;background:var(--accent);border:none;color:#000;font-family:'Manrope',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:opacity .2s}
.btn-save:active{opacity:.8}
.btn-cancel{padding:13px 18px;border-radius:10px;background:var(--card2);border:1px solid var(--border);color:var(--muted);font-family:'Manrope',sans-serif;font-weight:600;font-size:13px;cursor:pointer}
.hist-content{padding:16px 12px}
.hist-day-header{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--accent);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.hist-entry{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.hist-date{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.hist-pills{display:flex;flex-wrap:wrap;gap:5px}
.hist-pill{background:var(--card2);border-radius:8px;padding:4px 9px;font-size:11px;color:var(--text);display:flex;gap:5px;align-items:center;font-weight:500}
.hist-pill .hw{color:var(--accent);font-weight:800;font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1}
.hist-empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 20px;line-height:1.8}
.bottom-nav{position:fixed;bottom:12px;left:0;right:0;background:transparent;border:none;display:flex;z-index:200;padding:0 12px;gap:12px;justify-content:space-between}
.nav-btn{flex:1;max-width:120px;padding:14px 8px;background:rgba(255,255,255,0.09);backdrop-filter:blur(20px) saturate(200%) brightness(115%);-webkit-backdrop-filter:blur(20px) saturate(200%) brightness(115%);border:1px solid rgba(255,255,255,0.18);border-radius:25px;color:var(--muted);cursor:pointer;font-family:'Manrope',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px;stroke-width:2}
.view{display:none}
.view.active{display:block}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--green);color:#000;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:800;opacity:0;transition:all .3s;z-index:900;pointer-events:none;white-space:nowrap;font-family:'Manrope',sans-serif}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="weight-input-bar" id="weightInputBar">
  <div class="wib-label"><b id="wibExName"></b>кг</div>
  <input class="wib-input" type="text" id="wibInput" inputmode="decimal"
    onkeydown="onWibKeydown(event)"
    oninput="onWibInput(this.value)"
    onchange="onWibInput(this.value)">
  <button class="wib-done" onclick="closeWib()">&#10003;</button>
</div>

<div class="img-expand-overlay" id="imgOverlay" onclick="closeImgOverlay()">
  <div class="img-expand-inner" onclick="event.stopPropagation()">
    <img id="imgOverlayImg" src="" alt="">
  </div>
</div>

<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">&#9999;&#65039; Изменить упражнение</div>
    <div class="modal-label">Название</div>
    <textarea class="modal-input" id="editName" rows="2"></textarea>
    <div class="modal-row">
      <div>
        <div class="modal-label">Подходы</div>
        <input class="modal-input" type="number" id="editSets" min="1" max="10" style="margin-bottom:0">
      </div>
      <div>
        <div class="modal-label">Повторения</div>
        <input class="modal-input" type="number" id="editReps" min="1" max="100" style="margin-bottom:0">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveEdit()">Сохранить</button>
    </div>
  </div>
</div>

<div class="view active" id="view-workout">
  <div class="header">
    <div class="day-tabs" id="dayTabs"></div>
    <div class="progress-wrap">
      <div class="progress-row"><span>Прогресс дня</span><b id="progLabel">0 / 0</b></div>
      <div class="progress-bg"><div class="progress-fill" id="progBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="done-banner" id="doneBanner">
    <div class="db-emoji">&#128293;</div>
    <div class="db-text">Тренировка завершена!</div>
    <div class="db-sub">Все упражнения выполнены</div>
  </div>
  <button class="finish-btn" id="finishBtn" onclick="finishWorkout()">&#10003; ЗАВЕРШИТЬ ТРЕНИРОВКУ</button>
  <div class="content" id="workoutContent"></div>
</div>

<div class="view" id="view-history">
  <div class="header">
    <div class="header-top">
      <div class="app-title">&#128202; ИСТОРИЯ</div>
      <button onclick="clearHistory()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--muted);font-size:10px;cursor:pointer;font-family:Manrope,sans-serif;font-weight:700">Очистить</button>
    </div>
  </div>
  <div class="hist-content" id="histContent"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-workout" onclick="switchView('workout')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 4v16M18 4v16M6 12h12M3 8h3M18 8h3M3 16h3M18 16h3"/></svg>
    Тренировка
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchView('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    История
  </button>
</nav>

<script>
var IMGS = {
  d1_1: "https://raw.githubusercontent.com/rpgdpg1-stack/TRPG_boot/refs/heads/main/IMG_1453.png",
  d1_2: null, d1_3: null, d1_4: null, d1_5: null, d1_6: null, d1_7: null, d1_8: null, d1_9: null,
  d2_1: null, d2_2: null, d2_3: null, d2_4: null, d2_5: null, d2_6: null, d2_7: null, d2_8: null, d2_9: null,
  d3_1: null, d3_2: null, d3_3: null, d3_4: null, d3_5: null, d3_6: null, d3_7: null, d3_8: null, d3_9: null
};

var IMGS_ANIM = {
  d1_1: "https://raw.githubusercontent.com/rpgdpg1-stack/TRPG_boot/refs/heads/main/IMG_1423.gif",
  d1_2: null, d1_3: null, d1_4: null, d1_5: null, d1_6: null, d1_7: null, d1_8: null, d1_9: null,
  d2_1: null, d2_2: null, d2_3: null, d2_4: null, d2_5: null, d2_6: null, d2_7: null, d2_8: null, d2_9: null,
  d3_1: null, d3_2: null, d3_3: null, d3_4: null, d3_5: null, d3_6: null, d3_7: null, d3_8: null, d3_9: null
};

var DEFAULT_PROGRAM = [
  { day:1, label:"DAY\n1", groups:[
    { name:"СПИНА", exercises:[
      { id:"d1_1", name:"Вертикальная тяга широким прямым хватом к груди", sets:4, reps:10 },
      { id:"d1_2", name:"Горизонтальная тяга блока сидя параллельным хватом (в идеале тяга Т-грифа с упором)", sets:4, reps:10 }
    ]},
    { name:"БИЦЕПС", exercises:[
      { id:"d1_3", name:"Поочередное сгибание рук с гантелями сидя на наклонной скамье 45°", sets:3, reps:12 },
      { id:"d1_4", name:"Сгибание рук с гантелями хватом молот стоя", sets:3, reps:12 }
    ]},
    { name:"НОГИ", exercises:[
      { id:"d1_5", name:"Разведение ног в тренажере", sets:3, reps:15 },
      { id:"d1_6", name:"Сгибание ног в тренажере сидя", sets:3, reps:12 }
    ]},
    { name:"ПРЕДПЛЕЧЬЯ", exercises:[
      { id:"d1_7", name:"Сгибание кисти", sets:3, reps:15 },
      { id:"d1_8", name:"Разгибание кисти", sets:3, reps:15 }
    ]},
    { name:"ПРЕСС", exercises:[
      { id:"d1_9", name:"Скручивание пресса на наклонной скамье", sets:3, reps:15 }
    ]}
  ]},
  { day:2, label:"DAY\n2", groups:[
    { name:"ГРУДЬ", exercises:[
      { id:"d2_1", name:"Жим гантелей лежа на наклонной скамье 30°-45°", sets:4, reps:10 },
      { id:"d2_2", name:"Сведение рук в тренажере бабочка", sets:3, reps:12 }
    ]},
    { name:"ТРИЦЕПС", exercises:[
      { id:"d2_3", name:"Разгибание рук с нижнего блока с канатом стоя", sets:3, reps:12 },
      { id:"d2_4", name:"Разгибание рук с верхнего блока с канатом стоя", sets:3, reps:12 }
    ]},
    { name:"НОГИ", exercises:[
      { id:"d2_5", name:"Сведение ног в тренажере", sets:3, reps:15 },
      { id:"d2_6", name:"Разгибания ног в тренажере сидя", sets:3, reps:12 }
    ]},
    { name:"ШЕЯ", exercises:[
      { id:"d2_7", name:"Подъем блина шеей лежа на спине", sets:3, reps:15 },
      { id:"d2_8", name:"Подъем блина шеей лежа на животе", sets:3, reps:15 }
    ]},
    { name:"ПРЕСС", exercises:[
      { id:"d2_9", name:"Подъем ног в висе на турнике", sets:3, reps:12 }
    ]}
  ]},
  { day:3, label:"DAY\n3", groups:[
    { name:"СПИНА + ГРУДЬ", exercises:[
      { id:"d3_1", name:"Подтягивания (прямым, параллельным, обратным, прямым)", sets:4, reps:10 },
      { id:"d3_2", name:"Жим штанги лежа (высота 11, 2 страховки)", sets:4, reps:8 }
    ]},
    { name:"ПЛЕЧИ", exercises:[
      { id:"d3_3", name:"Махи гантелями в стороны стоя", sets:4, reps:15 },
      { id:"d3_4", name:"Тяга к лицу Face pull (высота тросса 27)", sets:3, reps:15 }
    ]},
    { name:"НОГИ", exercises:[
      { id:"d3_5", name:"Приседания с штангой в Смите", sets:4, reps:10 },
      { id:"d3_6", name:"Жим ногами платформы", sets:3, reps:12 }
    ]},
    { name:"ИКРЫ + ПЛЕЧИ", exercises:[
      { id:"d3_7", name:"Подъем на носки стоя в тренажере", sets:4, reps:15 },
      { id:"d3_8", name:"Армейский жим гантелями на скамье с наклоном 75°-85°", sets:3, reps:12 }
    ]},
    { name:"ГИПЕРЭКСТЕНЗИЯ", exercises:[
      { id:"d3_9", name:"Гиперэкстензия у стены с гантелями", sets:3, reps:15 }
    ]}
  ]}
];

var DEFAULT_WEIGHTS = {
  d1_1:0, d1_2:0, d1_3:0, d1_4:0, d1_5:0, d1_6:0, d1_7:0, d1_8:0, d1_9:0,
  d2_1:0, d2_2:0, d2_3:0, d2_4:0, d2_5:0, d2_6:0, d2_7:0, d2_8:0, d2_9:0,
  d3_1:0, d3_2:0, d3_3:0, d3_4:0, d3_5:0, d3_6:0, d3_7:0, d3_8:0, d3_9:0
};

var S = { currentDay:0, step:2.5, program:null, weights:{}, done:{}, history:[], openPanel:null, editTarget:null };

function load() {
  try { var r = localStorage.getItem('gym_v4'); if(r) S = Object.assign({}, S, JSON.parse(r)); } catch(e){}
  if (!S.program) S.program = JSON.parse(JSON.stringify(DEFAULT_PROGRAM));
  if (!S.weights || !Object.keys(S.weights).length) S.weights = Object.assign({}, DEFAULT_WEIGHTS);
  if (!S.history) S.history = [];
  if (!S.done) S.done = {};
  if (!S.step) S.step = 2.5;
}

function save() { try { localStorage.setItem('gym_v4', JSON.stringify(S)); } catch(e){} }

function switchView(v) {
  document.querySelectorAll('.view').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  if (v === 'history') renderHistory();
}

function renderDayTabs() {
  var c = document.getElementById('dayTabs');
  c.innerHTML = '';
  S.program.forEach(function(day, i) {
    var b = document.createElement('button');
    b.className = 'day-tab' + (i === S.currentDay ? ' active' : '');
    b.innerHTML = '<span class="dn">' + day.day + '</span>';
    b.onclick = (function(idx){ return function(){ S.currentDay=idx; S.openPanel=null; save(); renderWorkout(); }; })(i);
    c.appendChild(b);
  });
}

function renderWorkout() {
  renderDayTabs();
  var day = S.program[S.currentDay];
  var allIds = [];
  day.groups.forEach(function(g){ g.exercises.forEach(function(e){ allIds.push(e.id); }); });
  var doneCount = allIds.filter(function(id){ return S.done[id]; }).length;
  var total = allIds.length;
  document.getElementById('progLabel').textContent = doneCount + ' / ' + total;
  document.getElementById('progBar').style.width = (total ? Math.round(doneCount/total*100) : 0) + '%';
  var sc = document.getElementById('sessionCount'); if(sc) sc.textContent = S.history.length;
  var allDone = doneCount === total && total > 0;
  document.getElementById('doneBanner').classList.toggle('show', allDone);
  document.getElementById('finishBtn').classList.toggle('show', allDone);

  var container = document.getElementById('workoutContent');
  container.innerHTML = '';

  day.groups.forEach(function(group, gi) {
    var gDiv = document.createElement('div');
    gDiv.className = 'muscle-group';
    gDiv.innerHTML = '<div class="muscle-label"><div class="dot"></div><span>' + group.name + '</span></div>';

    group.exercises.forEach(function(ex, ei) {
      var isDone = !!S.done[ex.id];
      var w = (S.weights[ex.id] !== undefined) ? S.weights[ex.id] : 0;
      var isOpen = S.openPanel === ex.id;
      var imgSrc = IMGS[ex.id] || null;
      var imgAnimSrc = IMGS_ANIM[ex.id] || imgSrc;

      var imgInner = imgSrc
        ? '<img src="' + imgSrc + '" alt="">'
        : '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 15l5-5 4 4 3-3 6 6"/><circle cx="8.5" cy="8.5" r="1.5"/></svg>';

      var card = document.createElement('div');
      card.className = 'exercise-card' + (isDone ? ' done' : '');

      var exId = ex.id;
      var curDay = S.currentDay;

      card.innerHTML =
        '<div class="ex-main">' +
          '<div class="ex-img" id="img_' + exId + '">' + imgInner + '</div>' +
          '<div class="ex-info">' +
            '<div class="ex-name">' + ex.name + '</div>' +
            '<div class="ex-sets">' + ex.sets + 'x' + ex.reps + '</div>' +
          '</div>' +
          '<div class="ex-right">' +
            '<div class="weight-col' + (isOpen ? ' editing' : '') + '" id="wcol_' + exId + '">' +
              '<div class="weight-val" data-id="' + exId + '">' + w + '</div>' +
              '<div class="weight-unit">кг</div>' +
            '</div>' +
            '<div class="ex-check">' + (isDone ? '<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="20 6 9 17 4 12"/></svg>' : '') + '</div>' +
          '</div>' +
        '</div>';

      // Картинка — открыть оверлей
      var imgDiv = card.querySelector('.ex-img');
      if (imgSrc) {
        imgDiv.addEventListener('click', (function(id, anim){ return function(){ tapImg(id, anim); }; })(exId, imgAnimSrc));
      }

      // Вес — открыть панель
      var wcolDiv = card.querySelector('.weight-col');
      wcolDiv.addEventListener('touchstart', (function(id){ return function(e){ touchStartWeight(e, id); }; })(exId), {passive:true});
      wcolDiv.addEventListener('touchend', (function(id){ return function(e){ touchEndWeight(e, id); }; })(exId));
      wcolDiv.addEventListener('click', (function(id){ return function(){ onWeightClick(id); }; })(exId));

      // Галочка
      var checkDiv = card.querySelector('.ex-check');
      checkDiv.addEventListener('click', (function(id){ return function(){ toggleDone(id); }; })(exId));

      // Редактирование названия — долгое нажатие
      var nameDiv = card.querySelector('.ex-name');
      nameDiv.addEventListener('contextmenu', (function(d,g,e){ return function(ev){ ev.preventDefault(); openEdit(d,g,e); }; })(curDay, gi, ei));

      gDiv.appendChild(card);
    });
    container.appendChild(gDiv);
  });
}

var _touchStartY = 0, _touchStartX = 0, _touchHandled = false;

function touchStartWeight(e, id) {
  _touchStartY = e.touches[0].clientY;
  _touchStartX = e.touches[0].clientX;
  _touchHandled = false;
}

function touchEndWeight(e, id) {
  var dy = Math.abs(e.changedTouches[0].clientY - _touchStartY);
  var dx = Math.abs(e.changedTouches[0].clientX - _touchStartX);
  if (dy > 8 || dx > 8) return;
  e.preventDefault();
  _touchHandled = true;
  togglePanel(id);
}

function onWeightClick(id) {
  if (_touchHandled) { _touchHandled = false; return; }
  togglePanel(id);
}

function tapImg(id, animSrc) {
  if (!animSrc) return;
  var img = document.getElementById('imgOverlayImg');
  img.src = animSrc + '?t=' + Date.now();
  document.getElementById('imgOverlay').classList.add('open');
}

function closeImgOverlay() {
  document.getElementById('imgOverlay').classList.remove('open');
  setTimeout(function(){ document.getElementById('imgOverlayImg').src = ''; }, 300);
}

function toggleDone(id) {
  if (S.openPanel) closeWib();
  S.done[id] = !S.done[id];
  save();
  renderWorkout();
}

var _weightFresh = false;

function togglePanel(id) {
  if (S.openPanel === id) { closeWib(); return; }
  if (S.openPanel) closeWib();

  S.openPanel = id;
  _weightFresh = true;
  save();

  // Hide bottom nav
  document.querySelector('.bottom-nav').style.display = 'none';

  var wcol = document.getElementById('wcol_' + id);
  if (wcol) wcol.classList.add('editing');

  var day = S.program[S.currentDay];
  var exName = '';
  day.groups.forEach(function(g){ g.exercises.forEach(function(e){ if(e.id===id) exName=e.name; }); });
  var w = (S.weights[id] !== undefined) ? S.weights[id] : 0;

  document.getElementById('wibExName').textContent = exName.length > 30 ? exName.slice(0,30) + '...' : exName;
  var wibInp = document.getElementById('wibInput');
  wibInp.value = w;
  wibInp.setAttribute('readonly', true);
  document.getElementById('weightInputBar').classList.add('open');

  var savedScroll = window.scrollY;

  if (window.visualViewport) {
    var onVPChange = function() {
      var bar = document.getElementById('weightInputBar');
      var vv = window.visualViewport;
      bar.style.bottom = (window.innerHeight - vv.height) + 'px';
    };
    window.visualViewport.addEventListener('resize', onVPChange);
    window.visualViewport.addEventListener('scroll', onVPChange);
    window._wibVVCleanup = onVPChange;
    window._wibSavedScroll = savedScroll;
  }

  setTimeout(function() {
    wibInp.removeAttribute('readonly');
    wibInp.focus();
    try { wibInp.setSelectionRange(wibInp.value.length, wibInp.value.length); } catch(e) {}
    window.scrollTo({ top: savedScroll, behavior: 'instant' });
  }, 50);
}

function closeWib() {
  S.openPanel = null;
  _weightFresh = false;
  save();
  var wibInp = document.getElementById('wibInput');
  wibInp.blur();
  var bar = document.getElementById('weightInputBar');
  bar.classList.remove('open');
  bar.style.bottom = '';
  if (window._wibVVCleanup && window.visualViewport) {
    window.visualViewport.removeEventListener('resize', window._wibVVCleanup);
    window.visualViewport.removeEventListener('scroll', window._wibVVCleanup);
    window._wibVVCleanup = null;
  }
  document.querySelectorAll('.weight-col.editing').forEach(function(el){ el.classList.remove('editing'); });
  // Show bottom nav again
  document.querySelector('.bottom-nav').style.display = 'flex';
}

function onWibKeydown(e) {
  if (e.key === 'Enter') { closeWib(); return; }
  if (e.key === 'Backspace' || e.key === 'Delete') { _weightFresh = false; return; }
  if (e.key === ',' || e.key === '.') { if (_weightFresh) { document.getElementById('wibInput').value = ''; _weightFresh = false; } return; }
  if (_weightFresh && e.key >= '0' && e.key <= '9') { document.getElementById('wibInput').value = ''; _weightFresh = false; }
}

function onWibInput(val) {
  if (!S.openPanel) return;
  var id = S.openPanel;
  var cleaned = String(val).replace(',', '.');
  var valEl = document.querySelector('.weight-val[data-id="' + id + '"]');
  if (valEl) valEl.textContent = cleaned.endsWith('.') ? cleaned : (parseFloat(cleaned) || 0);
  S.weights[id] = Math.max(0, parseFloat(cleaned) || 0);
  save();
}

function openEdit(di, gi, ei) {
  S.editTarget = { di:di, gi:gi, ei:ei };
  var ex = S.program[di].groups[gi].exercises[ei];
  document.getElementById('editName').value = ex.name;
  document.getElementById('editSets').value = ex.sets;
  document.getElementById('editReps').value = ex.reps;
  document.getElementById('editOverlay').classList.add('open');
}

function closeModal() { document.getElementById('editOverlay').classList.remove('open'); S.editTarget = null; }

function saveEdit() {
  if (!S.editTarget) return;
  var di = S.editTarget.di, gi = S.editTarget.gi, ei = S.editTarget.ei;
  var ex = S.program[di].groups[gi].exercises[ei];
  var n = document.getElementById('editName').value.trim();
  if (n) ex.name = n;
  ex.sets = parseInt(document.getElementById('editSets').value) || ex.sets;
  ex.reps = parseInt(document.getElementById('editReps').value) || ex.reps;
  save(); closeModal(); showToast('Сохранено'); renderWorkout();
}

function finishWorkout() {
  var day = S.program[S.currentDay];
  var allIds = [];
  day.groups.forEach(function(g){ g.exercises.forEach(function(e){ allIds.push(e.id); }); });
  var snap = {};
  allIds.forEach(function(id){ snap[id] = (S.weights[id] !== undefined) ? S.weights[id] : 0; });
  S.history.push({ date: Date.now(), dayIdx: S.currentDay, weights: snap });
  allIds.forEach(function(id){ delete S.done[id]; });
  save(); showToast('Тренировка сохранена!'); renderWorkout();
}

function renderHistory() {
  var container = document.getElementById('histContent');
  if (!S.history.length) {
    container.innerHTML = '<div class="hist-empty">История пуста<br><span style="font-size:11px">Завершите тренировку,<br>чтобы данные сохранились</span></div>';
    return;
  }
  var byDay = [[], [], []];
  var rev = S.history.slice().reverse();
  rev.forEach(function(h){ if(byDay[h.dayIdx]) byDay[h.dayIdx].push(h); });
  var html = '';
  S.program.forEach(function(day, di) {
    var entries = byDay[di];
    if (!entries.length) return;
    html += '<div class="hist-day-header">День ' + day.day + '</div>';
    entries.forEach(function(h) {
      var d = new Date(h.date);
      var ds = d.getDate() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      var exList = [];
      day.groups.forEach(function(g){ g.exercises.forEach(function(ex){ exList.push(ex); }); });
      var pills = exList.map(function(ex) {
        var w = h.weights[ex.id];
        if (w === undefined) return '';
        var short = ex.name.split(' ').slice(0,3).join(' ');
        return '<div class="hist-pill"><span style="color:var(--muted);font-size:10px">' + short + '</span><span class="hw">' + w + '</span></div>';
      }).join('');
      html += '<div class="hist-entry"><div class="hist-date">' + ds + '</div><div class="hist-pills">' + pills + '</div></div>';
    });
  });
  container.innerHTML = html;
}

function clearHistory() {
  if (!confirm('Очистить всю историю?')) return;
  S.history = []; save(); renderHistory(); showToast('История очищена');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

document.addEventListener('DOMContentLoaded', function() {
  if (window.Telegram && window.Telegram.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }
  load();
  S.openPanel = null;
  renderWorkout();

  document.addEventListener('click', function(e) {
    if (!S.openPanel) return;
    var bar = document.getElementById('weightInputBar');
    var wcol = document.getElementById('wcol_' + S.openPanel);
    if (bar && !bar.contains(e.target) && wcol && !wcol.contains(e.target)) closeWib();
  });
});
</script>
