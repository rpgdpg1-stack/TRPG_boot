<!DOCTYPE html>

<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RPG Training</title>

<style>

body {

    background:#0a0a0a;

    color:#fff;

    font-family:system-ui;

    margin:0;

}

.card {

    background:#161618;

    margin:10px;

    padding:16px;

    border-radius:20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    transition:0.2s;

}

.card.done {

    opacity:0.4;

    transform:scale(0.97);

}

.btn {

    background:#9ED153;

    color:#000;

    border:none;

    padding:16px;

    border-radius:999px;

    width:90%;

    margin:20px auto;

    display:block;

    font-weight:800;

    box-shadow:0 0 24px rgba(158,209,83,0.25);

}

#finish {

    position:fixed;

    inset:0;

    background:#000;

    display:none;

    align-items:center;

    justify-content:center;

    flex-direction:column;

}

</style>

</head>

<body>

<h2 style="text-align:center;">💪 RPG TRAINING</h2>

<div id="list"></div>

<button class="btn" onclick="finishWorkout()">ЗАВЕРШИТЬ</button>

<div id="finish">

    <h1>🔥 МОЩНО</h1>

    <p id="finishText"></p>

    <button class="btn" onclick="location.reload()">OK</button>

</div>

<script>

const tg = window.Telegram?.WebApp || {

    HapticFeedback:{

        impactOccurred:()=>{},

        notificationOccurred:()=>{}

    },

    CloudStorage:{

        setItem:()=>{},

        getItem:(k,cb)=>cb(null,null)

    }

};

let state = {

    exercises:[

        {id:1,name:"Жим лёжа"},

        {id:2,name:"Тяга"},

        {id:3,name:"Присед"}

    ],

    done:[]

};

/* ========= LOAD ========= */

tg.CloudStorage.getItem('rpg_v5_state',(e,val)=>{

    if(val){

        state = JSON.parse(val);

    }

    render();

});

/* ========= SAVE ========= */

function save(){

    tg.CloudStorage.setItem('rpg_v5_state',JSON.stringify(state));

}

/* ========= RENDER ========= */

function render(){

    const list = document.getElementById('list');

    list.innerHTML = state.exercises.map(ex=>{

        const done = state.done.includes(ex.id);

        return `

        <div class="card ${done?'done':''}" onclick="toggle(${ex.id})">

            <div>${ex.name}</div>

            <div>${done?'✅':''}</div>

        </div>

        `;

    }).join('');

}

/* ========= TOGGLE ========= */

function toggle(id){

    if(state.done.includes(id)){

        state.done = state.done.filter(i=>i!==id);

        tg.HapticFeedback.impactOccurred('light');

    }else{

        state.done.push(id);

        tg.HapticFeedback.notificationOccurred('success');

        startRest();

        setTimeout(()=>{

            scrollNext(id);

        },300);

    }

    save();

    render();

}

/* ========= SCROLL ========= */

function scrollNext(id){

    const index = state.exercises.findIndex(e=>e.id===id);

    if(index === -1) return;

    const next = document.querySelectorAll('.card')[index+1];

    if(next){

        next.scrollIntoView({behavior:'smooth',block:'center'});

    }

}

/* ========= REST ========= */

let restTimer=null;

function startRest(){

    if(restTimer) clearTimeout(restTimer);

    restTimer = setTimeout(()=>{

        tg.HapticFeedback.impactOccurred('medium');

    },2000);

}

/* ========= FINISH ========= */

function finishWorkout(){

    if(state.done.length === 0){

        alert("Сделай хотя бы одно упражнение");

        return;

    }

    document.getElementById('finish').style.display='flex';

    document.getElementById('finishText').innerText =

        `Сделано: ${state.done.length} упражнений`;

    tg.HapticFeedback.notificationOccurred('success');

    state.done=[];

    save();

}

</script>

</body>

</html>
