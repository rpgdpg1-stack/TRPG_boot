<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Цвет статус-бара и системных областей iOS/Android.
         Должен совпадать с --color-bg чтобы не было видимых "швов" между
         приложением и системным UI Telegram. -->
    <meta name="theme-color" content="#0D0C0C" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <title>RPG Training</title>

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Google Fonts: Geist, Manrope, Tiny5 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Tiny5&display=swap"
      rel="stylesheet"
    />

    <!-- Цвет фона страницы ставим из CSS-переменной сразу, до загрузки JS,
         чтобы при медленном интернете не было белой вспышки. -->
    <style>
      html, body { background: #0D0C0C; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
