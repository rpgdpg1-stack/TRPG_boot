<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TrainingRPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Фиксированный хедер -->
        <header class="sticky-header">
            <div class="header-content">
                <div class="day-selector-trigger" onclick="openDayPicker()">
                    <span id="day-display">A</span>
                    <span class="arrow-down">↓</span>
                </div>
                <div class="progress-container">
                    <span id="progress-text">0 / 0 ПРОГРЕСС</span>
                    <div class="progress-bg">
                        <div id="progress-fill"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Список упражнений с отступом под хедер -->
        <main class="content-scroll">
            <div id="exercise-list"></div>
            <button class="btn-finish" onclick="finishWorkout()">ЗАВЕРШИТЬ ТРЕНИРОВКУ</button>
        </main>

        <!-- Модалка выбора дня -->
        <div id="day-picker-overlay" class="modal-overlay hidden" onclick="closeDayPicker()">
            <div class="bottom-sheet" onclick="event.stopPropagation()">
                <div class="sheet-handle"></div>
                <div class="sheet-header">ВЫБЕРИТЕ ДЕНЬ</div>
                <div class="days-grid">
                    <div class="day-option" onclick="changeDay('A')"><span class="day-letter">A</span></div>
                    <div class="day-option" onclick="changeDay('B')"><span class="day-letter">Б</span></div>
                    <div class="day-option" onclick="changeDay('C')"><span class="day-letter">C</span></div>
                </div>
            </div>
        </div>

        <!-- Окно Информации (Упрощенное) -->
        <div id="info-modal" class="info-modal hidden">
            <div class="info-nav">
                <button onclick="closeInfo()">← НАЗАД</button>
            </div>
            <div id="info-content-body">
                <!-- Сюда JS вставит видео и текст -->
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item">🏠</div>
            <div class="tab-item active">🔥</div>
            <div class="tab-item">⚙️</div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
