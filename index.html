<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrainingRPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <div id="screen-programs" class="screen hidden">
            <h1 class="font-tiny">PROGRAMS</h1>
            <div class="program-card" onclick="selectProgram('gym')">
                <div class="program-icon">🏋️‍♂️</div>
                <span>СПОРТЗАЛ</span>
            </div>
            <div class="program-card" onclick="selectProgram('pool')">
                <div class="program-icon">🏊‍♂️</div>
                <span>БАССЕЙН</span>
            </div>
        </div>

        <div id="screen-training" class="screen">
            <header class="header">
                <div class="day-selector" onclick="toggleDayPicker()">
                    <h1 id="current-day-label" class="font-tiny">A</h1>
                </div>
                
                <div class="progress-container">
                    <span id="progress-text" class="progress-label">0 / 0</span>
                    <div class="progress-bar">
                        <div id="progress-fill"></div>
                    </div>
                </div>
            </header>

            <div id="exercise-list" class="exercise-list">
                </div>

            <button class="btn-finish" onclick="finishWorkout()">ЗАВЕРШИТЬ ТРЕНИРОВКУ</button>
        </div>

        <nav class="tab-bar">
            <div class="tab-item" onclick="showScreen('programs')">🏠</div>
            <div class="tab-item active">🔥</div>
            <div class="tab-item">⚙️</div>
        </nav>

        <div id="modal-congrats" class="modal hidden" onclick="closeCongrats()">
            <div class="modal-content">
                <img src="https://cdn.selectel.ru/your-congrats-image.png" alt="Done">
                <h2>КРАСАВА!</h2>
                <p>Тренировка завершена успешно.</p>
                <button onclick="closeCongrats()">ОК</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
