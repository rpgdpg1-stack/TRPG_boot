<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>💪 Тренировки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&family=Tiny5&display=swap');

/* ── ПЕРЕМЕННЫЕ ── */
:root {
–bg: #101010;
–card: #232323;
–card2: #2a2a2a;
–accent: #AAD066;
–text: #efefef;
–muted: #5a5a5a;
–border: #2a2a2a;
–glass-bg: rgba(255,255,255,0.07);
–glass-border: rgba(255,255,255,0.18);
–glass-blur: blur(20px) saturate(200%) brightness(115%);
}

/* ── СБРОС — важно для Safari/iOS ── */
*, *::before, *::after {
margin: 0;
padding: 0;
box-sizing: border-box;
-webkit-tap-highlight-color: transparent;
}

/* Полный сброс кнопок — убирает синий iOS стиль */
button {
-webkit-appearance: none !important;
-moz-appearance: none !important;
appearance: none !important;
outline: none;
border: none;
background: transparent;
color: inherit;
font: inherit;
cursor: pointer;
}

input, textarea {
-webkit-appearance: none;
appearance: none;
outline: none;
border: none;
}

/* ── ТЕЛО ── */
html, body {
width: 100%;
min-height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘Manrope’, sans-serif;
-webkit-text-size-adjust: 100%;
overflow-x: hidden;
}
body {
padding-bottom: 100px;
-webkit-overflow-scrolling: touch;
}

/* ── ХЕДЕР — fixed, как нижние кнопки ── */
.header {
position: fixed;
top: 0;
left: 0;
right: 0;
z-index: 100;
padding: 10px 0 0;
}

/* Контент начинается ниже фиксированного хедера:
10px padding-top + 145px SVG + 10px margin-bottom = 165px */
#view-workout .content {
padding-top: 165px;
}

/* SVG-контейнер хедера */
.header-svg-area {
width: 100%;
height: 145px;
margin-bottom: 10px;
background: transparent;
}
.header-svg-area svg.day-svg {
display: block;
width: 100%;
height: 145px;
background: transparent;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
}
/* Все path и text в SVG — кликабельны */
.header-svg-area svg.day-svg path,
.header-svg-area svg.day-svg rect,
.header-svg-area svg.day-svg text {
pointer-events: all;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
}

/* ── КОНТЕНТ ── */
.content { padding: 16px 12px 0; }
.muscle-group { margin-bottom: 24px; }
.muscle-label {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
margin-bottom: 14px;
padding: 0 4px;
text-align: center;
}
.muscle-label .dot {
width: 6px; height: 6px;
border-radius: 50%;
background: #fff;
flex-shrink: 0;
}
.muscle-label span {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 15px;
letter-spacing: 3px;
color: #fff;
text-transform: uppercase;
}

/* ── КАРТОЧКИ УПРАЖНЕНИЙ ── */
.exercise-card {
background: var(–card);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 25px;
margin-bottom: 8px;
overflow: hidden;
transition: border-color .25s, opacity .25s;
}
.exercise-card.done { border-color: #333; opacity: .6; }
.ex-main { display: flex; align-items: center; padding: 8px 10px; gap: 12px; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 12.5px; font-weight: 700; line-height: 1.4; color: #b0b0b0; cursor: pointer; }
.exercise-card.done .ex-name { text-decoration: line-through; color: var(–muted); }
.ex-sets { font-size: 10px; color: var(–muted); margin-top: 3px; }
.ex-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.weight-col {
display: flex; flex-direction: row; align-items: center; justify-content: center;
flex-shrink: 0; gap: 0; cursor: pointer; padding: 6px; border-radius: 15px;
transition: background .15s;
}
.weight-col.editing .weight-val {
border-color: var(–accent);
background: rgba(170,208,102,0.1);
}
.weight-val {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 24px; color: var(–accent); line-height: 1; text-align: center;
padding: 6px; display: inline-flex; align-items: center; justify-content: center;
border: 2px solid transparent; border-radius: 12px; transition: border-color .2s;
}
.weight-unit {
font-size: 9px; color: var(–muted); text-transform: uppercase;
letter-spacing: 1px; font-weight: 600; margin-left: 3px;
}
.ex-check {
width: 36px; height: 36px; border-radius: 15px;
border: 2px solid #3a3a3a; background: transparent; cursor: pointer;
flex-shrink: 0; display: flex; align-items: center; justify-content: center;
transition: all .2s; color: transparent;
}
.exercise-card.done .ex-check { background: var(–accent); border-color: #5a5a5a; color: #000; }
.ex-img {
width: 120px; height: 120px; border-radius: 17px; overflow: hidden;
flex-shrink: 0; background: var(–card2); display: flex; align-items: center;
justify-content: center; cursor: pointer;
}
.ex-img img { width: 120px; height: 120px; object-fit: contain; border-radius: 17px; display: block; }
.ex-img svg { width: 36px; height: 36px; stroke: var(–muted); stroke-width: 1.5; fill: none; }

/* ── ВВОД ВЕСА ── */
.weight-input-bar {
display: none;
position: fixed; left: 18px; right: 18px; bottom: 18px; z-index: 1000;
background: var(–glass-bg);
-webkit-backdrop-filter: var(–glass-blur);
backdrop-filter: var(–glass-blur);
border: 1px solid var(–glass-border);
border-radius: 25px; padding: 10px 16px;
align-items: center; gap: 12px;
box-shadow: 0 4px 32px rgba(0,0,0,.6);
}
.weight-input-bar.open { display: flex; }
.wib-label { font-size: 11px; color: var(–muted); flex: 1; line-height: 1.4; font-weight: 600; }
.wib-label b { display: block; color: var(–text); font-size: 12px; margin-bottom: 1px; }
.wib-kg { font-size: 10px; color: var(–muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.wib-input {
-webkit-appearance: none; appearance: none;
background: var(–card2); border: 2px solid var(–accent) !important;
border-radius: 17px; color: var(–accent);
font-family: ‘Bebas Neue’, sans-serif; font-size: 28px;
text-align: center; padding: 8px 12px; width: 110px; flex-shrink: 0;
}

/* ── ОВЕРЛЕИ ── */
.img-expand-overlay {
display: none; position: fixed; inset: 0; z-index: 400;
background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
}
.img-expand-overlay.open { display: flex; }
.img-expand-inner {
width: 88vw; max-width: 380px; border-radius: 25px;
overflow: hidden; background: var(–card); padding: 10px;
box-shadow: 0 24px 64px rgba(0,0,0,.9);
}
.img-expand-inner img { width: 100%; height: auto; display: block; border-radius: 15px; }

.overlay {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,.8); z-index: 500;
align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
background: rgba(22,22,22,0.95);
-webkit-backdrop-filter: blur(20px);
backdrop-filter: blur(20px);
border-radius: 20px 20px 0 0;
padding: 20px 18px 40px; width: 100%; max-width: 480px;
border-top: 1px solid rgba(255,255,255,0.08);
}
.modal-handle { width: 36px; height: 4px; background: var(–border); border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-family: ‘Bebas Neue’, sans-serif; font-size: 20px; letter-spacing: 1px; margin-bottom: 14px; color: var(–accent); }
.modal-label { font-size: 10px; color: var(–muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: 700; }
.modal-input {
-webkit-appearance: none; appearance: none;
width: 100%; background: var(–card2); border: 1.5px solid var(–border) !important;
border-radius: 10px; color: var(–text); font-family: ‘Manrope’, sans-serif;
font-size: 13px; padding: 10px 12px; resize: none; line-height: 1.5;
transition: border-color .2s; margin-bottom: 12px;
}
.modal-input:focus { border-color: var(–accent) !important; }
.modal-row { display: flex; gap: 8px; margin-bottom: 16px; }
.modal-row > div { flex: 1; }
.modal-btns { display: flex; gap: 8px; }
.btn-save {
flex: 1; padding: 13px; border-radius: 10px;
background: var(–accent); color: #000;
font-family: ‘Manrope’, sans-serif; font-weight: 800; font-size: 13px;
transition: opacity .2s;
}
.btn-save:active { opacity: .8; }
.btn-cancel {
padding: 13px 18px; border-radius: 10px;
background: var(–card2); border: 1px solid var(–border) !important;
color: var(–muted); font-family: ‘Manrope’, sans-serif; font-weight: 600; font-size: 13px;
}

/* ── BANNER / FINISH ── */
.done-banner {
display: none;
background: linear-gradient(135deg, rgba(170,208,102,0.08), rgba(170,208,102,0.02));
border: 1px solid rgba(170,208,102,0.25);
border-radius: 25px; padding: 16px; margin: 0 12px 16px; text-align: center;
}
.done-banner.show { display: block; }
.done-banner .db-emoji { font-size: 32px; margin-bottom: 6px; }
.done-banner .db-text { font-family: ‘Bebas Neue’, sans-serif; font-size: 18px; letter-spacing: 2px; color: var(–accent); }
.done-banner .db-sub { font-size: 11px; color: var(–muted); margin-top: 4px; }

.finish-btn {
display: block; width: 100%; padding: 14px 16px; border-radius: 25px;
background: rgba(200,60,60,0.85);
-webkit-backdrop-filter: var(–glass-blur);
backdrop-filter: var(–glass-blur);
border: 1px solid rgba(255,120,120,0.25) !important;
color: #fff; font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px; letter-spacing: 2px; text-align: center;
transition: opacity .2s;
}
.finish-btn:active { opacity: .7; }

/* ── ИСТОРИЯ ── */
.hist-content { padding: 16px 12px; }
.hist-day-header {
font-family: ‘Bebas Neue’, sans-serif; font-size: 18px; letter-spacing: 1px;
color: var(–accent); margin: 16px 0 8px; display: flex; align-items: center; gap: 8px;
}
.hist-entry {
background: var(–card); border: 1px solid var(–border);
border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
}
.hist-date { font-size: 10px; color: var(–muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
.hist-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.hist-pill {
background: var(–card2); border-radius: 8px; padding: 4px 9px;
font-size: 11px; color: var(–text); display: flex; gap: 5px; align-items: center; font-weight: 500;
}
.hist-pill .hw { color: var(–accent); font-weight: 800; font-family: ‘Bebas Neue’, sans-serif; font-size: 14px; line-height: 1; }
.hist-empty { color: var(–muted); font-size: 13px; text-align: center; padding: 40px 20px; line-height: 1.8; }

/* ── НИЖНЯЯ НАВИГАЦИЯ ── */
.bottom-nav {
position: fixed; bottom: 18px; left: 0; right: 0;
display: flex; z-index: 200; padding: 0 18px; gap: 12px;
justify-content: space-between;
/* isolation нужен для backdrop-filter в Safari */
isolation: isolate;
pointer-events: none;
}
.nav-btn {
-webkit-appearance: none !important;
appearance: none !important;
pointer-events: all;
flex: 1; max-width: 120px; height: 70px; padding: 0 8px;
background: var(–glass-bg) !important;
-webkit-backdrop-filter: var(–glass-blur) !important;
backdrop-filter: var(–glass-blur) !important;
border: 1px solid var(–glass-border) !important;
border-radius: 35px;
color: var(–muted) !important;
font-family: ‘Manrope’, sans-serif; font-size: 9px;
text-transform: uppercase; letter-spacing: .5px; font-weight: 700;
display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
transition: color .2s;
/* Убираем любые системные стили */
-webkit-text-fill-color: initial;
text-decoration: none;
}
.nav-btn.active {
color: var(–accent) !important;
-webkit-text-fill-color: initial;
}
.nav-btn svg {
width: 20px; height: 20px; stroke-width: 2;
/* stroke берётся из currentColor — важно для Safari */
stroke: currentColor;
fill: none;
}

/* ── ВСПОМОГАТЕЛЬНЫЕ ── */
.view { display: none; }
.view.active { display: block; }

.toast {
position: fixed; bottom: 100px; left: 50%;
transform: translateX(-50%) translateY(16px);
background: #4a6e2a; color: #fff;
padding: 9px 18px; border-radius: 20px;
font-size: 12px; font-weight: 800; opacity: 0;
transition: all .3s; z-index: 900; pointer-events: none;
white-space: nowrap; font-family: ‘Manrope’, sans-serif;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.app-title { font-family: ‘Bebas Neue’, sans-serif; font-size: 18px; letter-spacing: 3px; color: #fff; }
</style>

</head>

  if(!S.program)S.program=JSON.parse(JSON.stringify(DEFAULT_PROGRAM));

/* ── PROGRESS ── */
function updateProgress(){
  var day=S.program[S.currentDay]; var allIds=[];
  day.groups.forEach(function(g){g.exercises.forEach(function(e){allIds.push(e.id);});});
  var done=allIds.filter(function(id){return S.done[id];}).length;
  var total=allIds.length;
  var pct=total?done/total:0;
  var i=S.currentDay+1;
  var f=document.getElementById('progFill'+i);
  var l=document.getElementById('progLabel'+i);
  if(f)f.setAttribute('width',Math.round(220*pct));
  if(l)l.textContent=done+'/'+total;
}

        '<div class="ex-main">'+
          '<div class="ex-img" id="img_'+exId+'">'+imgInner+'</div>'+
          '<div class="ex-info">'+
            '<div class="ex-name">'+ex.name+'</div>'+
            '<div class="ex-sets">'+ex.sets+'x'+ex.reps+'</div>'+
          '</div>'+
          '<div class="ex-right">'+
            '<div class="weight-col'+(isOpen?' editing':'')+'" id="wcol_'+exId+'">'+
              '<div class="weight-val" data-id="'+exId+'">'+w+'</div>'+
              '<div class="weight-unit">кг</div>'+
            '</div>'+
            '<div class="ex-check">'+(isDone?'<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="20 6 9 17 4 12"/></svg>':'')+
            '</div>'+
          '</div>'+
        '</div>';

      if(imgSrc){
        card.querySelector('.ex-img').addEventListener('click',(function(id,anim){return function(){tapImg(id,anim);};})(exId,imgAnimSrc));
      }
      var wcolDiv=card.querySelector('.weight-col');
      wcolDiv.addEventListener('touchstart',(function(id){return function(e){touchStartWeight(e,id);};})(exId),{passive:true});
      wcolDiv.addEventListener('touchend',(function(id){return function(e){touchEndWeight(e,id);};})(exId));
      wcolDiv.addEventListener('click',(function(id){return function(){onWeightClick(id);};})(exId));
      card.querySelector('.ex-check').addEventListener('click',(function(id){return function(){toggleDone(id);};})(exId));
      card.querySelector('.ex-name').addEventListener('contextmenu',(function(d,g,e){return function(ev){ev.preventDefault();openEdit(d,g,e);};})(curDay,gi,ei));

/* ── TOUCH WEIGHT ── */
var _tsY=0,_tsX=0,_tsDone=false;
function touchStartWeight(e,id){_tsY=e.touches[0].clientY;_tsX=e.touches[0].clientX;_tsDone=false;}
function touchEndWeight(e,id){
  if(Math.abs(e.changedTouches[0].clientY-_tsY)>8||Math.abs(e.changedTouches[0].clientX-_tsX)>8)return;
  e.preventDefault();_tsDone=true;togglePanel(id);
}
function onWeightClick(id){if(_tsDone){_tsDone=false;return;}togglePanel(id);}

function tapImg(id,animSrc){
  if(!animSrc)return;
  document.getElementById('imgOverlayImg').src=animSrc+'?t='+Date.now();
  document.getElementById('imgOverlay').classList.add('open');
}
function closeImgOverlay(){
  document.getElementById('imgOverlay').classList.remove('open');
  setTimeout(function(){document.getElementById('imgOverlayImg').src='';},300);
}
function toggleDone(id){
  if(S.openPanel)closeWib();
  S.done[id]=!S.done[id];save();renderWorkoutContent();updateProgress();
}

var _wFresh=false;
function togglePanel(id){
  if(S.openPanel===id){closeWib();return;}
  if(S.openPanel){
    document.querySelectorAll('.weight-col.editing').forEach(function(el){el.classList.remove('editing');});
    S.openPanel=id;_wFresh=true;save();
    var wcol=document.getElementById('wcol_'+id);if(wcol)wcol.classList.add('editing');
    var day=S.program[S.currentDay];var exName='';
    day.groups.forEach(function(g){g.exercises.forEach(function(e){if(e.id===id)exName=e.name;});});
    document.getElementById('wibExName').textContent=exName.length>30?exName.slice(0,30)+'...':exName;
    document.getElementById('wibInput').value=(S.weights[id]!==undefined)?S.weights[id]:0;
    return;
  }
  S.openPanel=id;_wFresh=true;save();
  document.querySelector('.bottom-nav').style.display='none';
  var wcol=document.getElementById('wcol_'+id);if(wcol)wcol.classList.add('editing');
  var day=S.program[S.currentDay];var exName='';
  day.groups.forEach(function(g){g.exercises.forEach(function(e){if(e.id===id)exName=e.name;});});
  document.getElementById('wibExName').textContent=exName.length>30?exName.slice(0,30)+'...':exName;
  var wibInp=document.getElementById('wibInput');
  wibInp.value=(S.weights[id]!==undefined)?S.weights[id]:0;
  var bar=document.getElementById('weightInputBar');
  bar.style.bottom='18px';bar.classList.add('open');
  function onVPR(){
    var vv=window.visualViewport;
    if(!vv)return;
    var kb=window.innerHeight-vv.height;
    bar.style.bottom=(kb>50?kb+4:18)+'px';
  }
  if(window.visualViewport){window.visualViewport.addEventListener('resize',onVPR);window._wibVV=onVPR;onVPR();}
  wibInp.focus();
  try{wibInp.setSelectionRange(wibInp.value.length,wibInp.value.length);}catch(e){}
}

function closeWib(){
  S.openPanel=null;_wFresh=false;save();
  if(window._wibVV&&window.visualViewport){window.visualViewport.removeEventListener('resize',window._wibVV);window._wibVV=null;}
  document.getElementById('wibInput').blur();
  var bar=document.getElementById('weightInputBar');
  bar.classList.remove('open');bar.style.bottom='18px';
  document.querySelectorAll('.weight-col.editing').forEach(function(el){el.classList.remove('editing');});
  document.querySelector('.bottom-nav').style.display='flex';
}
function onWibBlur(){
  if(window.Telegram&&window.Telegram.WebApp){try{window.Telegram.WebApp.HapticFeedback.impactOccurred('light');}catch(e){}}
  setTimeout(function(){if(S.openPanel)closeWib();},150);
}
function onWibKeydown(e){
  if(e.key==='Enter'){closeWib();return;}
  if(e.key==='Backspace'||e.key==='Delete'){_wFresh=false;return;}
  if(e.key===','||e.key==='.'){if(_wFresh){document.getElementById('wibInput').value='';_wFresh=false;}return;}
  if(_wFresh&&e.key>='0'&&e.key<='9'){document.getElementById('wibInput').value='';_wFresh=false;}
}
function onWibInput(val){
  if(!S.openPanel)return;
  var id=S.openPanel;
  var cleaned=String(val).replace(',','.');
  var valEl=document.querySelector('.weight-val[data-id="'+id+'"]');
  if(valEl)valEl.textContent=cleaned.endsWith('.')?cleaned:(parseFloat(cleaned)||0);
  S.weights[id]=Math.max(0,parseFloat(cleaned)||0);save();
}

/* ── EDIT MODAL ── */
function openEdit(di,gi,ei){
  S.editTarget={di:di,gi:gi,ei:ei};
  var ex=S.program[di].groups[gi].exercises[ei];
  document.getElementById('editName').value=ex.name;
  document.getElementById('editSets').value=ex.sets;
  document.getElementById('editReps').value=ex.reps;
  document.getElementById('editOverlay').classList.add('open');
}
function closeModal(){document.getElementById('editOverlay').classList.remove('open');S.editTarget=null;}
function saveEdit(){
  if(!S.editTarget)return;
  var ex=S.program[S.editTarget.di].groups[S.editTarget.gi].exercises[S.editTarget.ei];
  var n=document.getElementById('editName').value.trim();
  if(n)ex.name=n;
  ex.sets=parseInt(document.getElementById('editSets').value)||ex.sets;
  ex.reps=parseInt(document.getElementById('editReps').value)||ex.reps;
  save();closeModal();showToast('Сохранено');renderWorkoutContent();
}

/* ── FINISH ── */
function finishWorkout(){
  if(window.Telegram&&window.Telegram.WebApp){try{window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');}catch(e){}}
  var day=S.program[S.currentDay];var allIds=[];
  day.groups.forEach(function(g){g.exercises.forEach(function(e){allIds.push(e.id);});});
  var snap={};
  allIds.forEach(function(id){snap[id]=(S.weights[id]!==undefined)?S.weights[id]:0;});
  S.history.push({date:Date.now(),dayIdx:S.currentDay,weights:snap});
  allIds.forEach(function(id){delete S.done[id];});
  save();showToast('Тренировка дня '+(S.currentDay+1)+' сохранена!');
  window.scrollTo({top:0,behavior:'instant'});renderWorkoutContent();updateProgress();
}

/* ── HISTORY ── */
function renderHistory(){
  var container=document.getElementById('histContent');
  var tempDone=[false,false,false];
  S.history.forEach(function(h){
    if(h.dayIdx>=0&&h.dayIdx<3){
      tempDone[h.dayIdx]=true;
      if(tempDone[0]&&tempDone[1]&&tempDone[2])tempDone=[false,false,false];
    }
  });
  var calHtml='<div style="display:flex;gap:12px;margin-bottom:20px;padding:0 4px;justify-content:center">';
  for(var d=0;d<3;d++){
    var isDone=tempDone[d];
    var st=isDone
      ?'flex:1;max-width:100px;aspect-ratio:1/1;border-radius:25px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:#4DC864;border:1.5px solid #4DC864;'
      :'flex:1;max-width:100px;aspect-ratio:1/1;border-radius:25px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.18);';
    var nc=isDone?'#000':'#5a5a5a';var lc=isDone?'#000':'#3a3a3a';
    calHtml+='<div style="'+st+'"><span style="font-family:Tiny5,sans-serif;font-size:32px;line-height:1;color:'+nc+'">'+(d+1)+'</span><span style="font-size:8px;font-weight:700;letter-spacing:1px;color:'+lc+'">'+(isDone?'DONE':'DAY')+'</span></div>';
  }
  calHtml+='</div>';
  if(!S.history.length){
    container.innerHTML=calHtml+'<div class="hist-empty">История пуста<br><span style="font-size:11px">Завершите тренировку,<br>чтобы данные сохранились</span></div>';
    return;
  }
  var byDay=[[],[],[]];
  S.history.slice().reverse().forEach(function(h){if(byDay[h.dayIdx])byDay[h.dayIdx].push(h);});
  var html=calHtml;
  S.program.forEach(function(day,di){
    if(!byDay[di].length)return;
    html+='<div class="hist-day-header">День '+day.day+'</div>';
    byDay[di].forEach(function(h){
      var d=new Date(h.date);
      var ds=d.getDate()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
      var exList=[];day.groups.forEach(function(g){g.exercises.forEach(function(ex){exList.push(ex);});});
      var pills=exList.map(function(ex){
        var w=h.weights[ex.id];if(w===undefined)return'';
        var short=ex.name.split(' ').slice(0,3).join(' ');
        return'<div class="hist-pill"><span style="color:#5a5a5a;font-size:10px">'+short+'</span><span class="hw">'+w+'</span></div>';
      }).join('');
      html+='<div class="hist-entry"><div class="hist-date">'+ds+'</div><div class="hist-pills">'+pills+'</div></div>';
    });
  });
  container.innerHTML=html;
}
function clearHistory(){
  if(!confirm('Очистить всю историю?'))return;
  S.history=[];save();renderHistory();showToast('История очищена');
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',function(){
  if(window.Telegram&&window.Telegram.WebApp){
    var tg=window.Telegram.WebApp;
    try{tg.ready();}catch(e){}
    try{tg.expand();}catch(e){}
    try{tg.disableVerticalSwipes();}catch(e){}
    try{tg.setHeaderColor('#101010');}catch(e){}
    try{tg.setBackgroundColor('#101010');}catch(e){}
    try{tg.setBottomBarColor('#101010');}catch(e){}
    try{tg.lockOrientation();}catch(e){}
  }

  load();
  S.openPanel=null;
  bindSvgClicks();
  renderWorkout();

  /* Закрыть панель веса при клике вне */
  document.addEventListener('click',function(e){
    if(!S.openPanel)return;
    var bar=document.getElementById('weightInputBar');
    if(bar&&bar.contains(e.target))return;
    var cols=document.querySelectorAll('.weight-col');
    for(var i=0;i<cols.length;i++){if(cols[i].contains(e.target))return;}
    closeWib();
  });

  /* Свайп между днями */
  var sx=0,sy=0,sm=false;
  var wv=document.getElementById('view-workout');
  wv.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;sm=false;},{passive:true});
  wv.addEventListener('touchmove',function(e){var dx=Math.abs(e.touches[0].clientX-sx);var dy=Math.abs(e.touches[0].clientY-sy);if(dx>dy)sm=true;},{passive:true});
  wv.addEventListener('touchend',function(e){
    if(!sm)return;
    var dx=e.changedTouches[0].clientX-sx;
    var dy=Math.abs(e.changedTouches[0].clientY-sy);
    if(Math.abs(dx)<60||dy>Math.abs(dx))return;
    if(S.openPanel)return;
    var total=S.program.length;
    S.currentDay=dx<0?(S.currentDay+1)%total:(S.currentDay-1+total)%total;
    S.openPanel=null;save();
    if(window.Telegram&&window.Telegram.WebApp){try{window.Telegram.WebApp.HapticFeedback.impactOccurred('light');}catch(e){}}
    showDaySvg(S.currentDay);renderWorkoutContent();updateProgress();
    window.scrollTo({top:0,behavior:'instant'});
  },{passive:true});
});
</script>
