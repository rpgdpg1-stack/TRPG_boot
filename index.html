<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Fit Pro App</title>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0C0C0C;
            --accent: #AAD066;
            --card: #222222;
            --text: #FFFFFF;
            --muted: #888888;
            --border: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; padding: 0 16px 40px; }

        /* HEADER & NAVIGATION */
        .header {
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
            padding: 15px 0 10px;
            user-select: none;
        }

        .nav-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: grab;
            padding-bottom: 10px;
        }

        .day-title {
            font-family: 'Tiny5', sans-serif;
            font-size: 56px;
            color: var(--accent);
            line-height: 0.8;
            margin-bottom: 12px;
        }

        .progress-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-label { font-size: 12px; color: var(--muted); white-space: nowrap; font-weight: 700; }

        .progress-bar-bg {
            flex-grow: 1;
            height: 4px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        /* LIST STRUCTURE */
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin: 20px 0 10px 4px;
            font-weight: 800;
            opacity: 0.7;
        }

        .exercise-list { display: flex; flex-direction: column; gap: 8px; }

        /* CARDS */
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 85px; /* Размер как в твоем файле */
            position: relative;
        }

        .card.done { opacity: 0.5; filter: grayscale(0.5); }

        .img-box {
            width: 60px;
            height: 60px;
            background: #111;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .info { flex-grow: 1; overflow: hidden; }
        .name { font-size: 15px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }

        /* WEIGHT INPUT */
        .weight-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-left: auto;
            padding-right: 5px;
        }

        .weight-val {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent);
            background: transparent;
            border: none;
            width: 50px;
            text-align: center;
            outline: none;
        }

        .weight-unit { font-size: 9px; color: var(--muted); text-transform: uppercase; }

        /* CHECKBOX */
        .check-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .done .check-btn {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* REPLACE BUTTON */
        .replace-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #333;
            color: #fff;
            font-size: 8px;
            padding: 2px 5px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-area" id="nav-area">
        <div class="day-title" id="day-title">A</div>
        <div class="progress-wrapper">
            <span class="progress-label" id="progress-text">ПРОГРЕСС 0/8</span>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
        </div>
    </div>
</div>

<div id="workout-content">
    </div>

<div class="modal" id="replace-modal" onclick="this.style.display='none'">
    <div style="width: 90%;">
        <p style="text-align: center; margin-bottom: 10px; font-size: 12px; color: var(--accent);">ВЫБЕРИТЕ ЗАМЕНУ</p>
        <div class="card" style="opacity: 1;">
            <div class="img-box">📸</div>
            <div class="info">
                <div class="name">Альтернативное упр.</div>
                <div class="meta">Будет доступно позже</div>
            </div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const content = document.getElementById('workout-content');
    let currentDay = 'A';

    const program = {
        'A': {
            base: [
                { id: 'a1', name: 'Подтягивания / Тяга блока', meta: 'Спина', goal: '3х8-10' },
                { id: 'a2', name: 'Приседания в Смите', meta: 'Ноги', goal: '3х8-10' },
                { id: 'a3', name: 'Жим штанги лежа', meta: 'Грудь', goal: '3х8-10' }
            ],
            iso: [
                { id: 'a4', name: 'Тяга к лицу', meta: 'Задняя дельта', goal: '3х15' },
                { id: 'a5', name: 'Махи гантелями', meta: 'Плечи', goal: '3х12-15' },
                { id: 'a6', name: 'Сгибания ног', meta: 'Бицепс бедра', goal: '3х12-15' },
                { id: 'a7', name: 'Бицепс на накл. скамье', meta: 'Бицепс', goal: '3х10-12' },
                { id: 'a8', name: 'Подъем ног в висе', meta: 'Пресс', goal: '3х15' }
            ]
        },
        'B': {
            base: [
                { id: 'b1', name: 'Жим ногами', meta: 'Ноги', goal: '3х10-12' },
                { id: 'b2', name: 'Горизонтальная тяга', meta: 'Спина', goal: '3х10' },
                { id: 'b3', name: 'Жим гантелей (наклон)', meta: 'Верх груди', goal: '3х10-12' }
            ],
            iso: [
                { id: 'b4', name: 'Бабочка (Сведения)', meta: 'Грудь', goal: '3х12-15' },
                { id: 'b5', name: 'Разгибания ног', meta: 'Квадрицепс', goal: '3х12-15' },
                { id: 'b6', name: 'Армейский жим', meta: 'Плечи', goal: '3х8-10' },
                { id: 'b7', name: 'Сведения / Разведения', meta: 'Бедра', goal: '3х15-20' },
                { id: 'b8', name: 'Трицепс на блоке', meta: 'Трицепс', goal: '3х12' }
            ]
        }
    };

    function render() {
        const dayData = program[currentDay];
        let html = '<div class="section-title">Базовые упражнения</div><div class="exercise-list">';
        
        dayData.base.forEach(ex => html += createCard(ex));
        html += '</div><div class="section-title">Изоляция</div><div class="exercise-list">';
        dayData.iso.forEach(ex => html += createCard(ex));
        html += '</div>';
        
        content.innerHTML = html;
        updateProgress();
    }

    function createCard(ex) {
        const weight = localStorage.getItem(`w_${ex.id}`) || '0';
        return `
            <div class="card" id="card-${ex.id}">
                <div class="replace-btn" onclick="openReplace(event)">Замена</div>
                <div class="img-box">📸</div>
                <div class="info">
                    <div class="name">${ex.name}</div>
                    <div class="meta">${ex.meta} • ${ex.goal}</div>
                </div>
                <div class="weight-control">
                    <input type="number" class="weight-val" value="${weight}" 
                           onchange="saveWeight('${ex.id}', this.value)" 
                           onclick="event.stopPropagation()">
                    <span class="weight-unit">кг</span>
                </div>
                <div class="check-btn" onclick="toggleDone('${ex.id}')">
                    <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="black" stroke-width="2.5"/></svg>
                </div>
            </div>
        `;
    }

    function toggleDone(id) {
        const el = document.getElementById(`card-${id}`);
        el.classList.toggle('done');
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        updateProgress();
    }

    function saveWeight(id, val) {
        localStorage.setItem(`w_${id}`, val);
    }

    function updateProgress() {
        const total = document.querySelectorAll('.card').length;
        const done = document.querySelectorAll('.card.done').length;
        const perc = (done / total) * 100;
        document.getElementById('progress-fill').style.width = perc + '%';
        document.getElementById('progress-text').innerText = `ПРОГРЕСС ${done}/${total}`;
    }

    function openReplace(e) {
        e.stopPropagation();
        document.getElementById('replace-modal').style.display = 'flex';
    }

    // SWIPE LOGIC ДЛЯ ХЕДЕРА
    let touchStartX = 0;
    const navArea = document.getElementById('nav-area');

    navArea.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
    navArea.addEventListener('touchend', e => {
        const touchEndX = e.changedTouches[0].clientX;
        if (Math.abs(touchStartX - touchEndX) > 50) {
            currentDay = currentDay === 'A' ? 'B' : 'A';
            document.getElementById('day-title').innerText = currentDay;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            render();
        }
    });

    render();
</script>

</body>
</html>
