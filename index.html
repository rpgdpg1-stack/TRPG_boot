<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RPG Training</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&family=Manrope:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Состояние загрузки (всегда сверху) -->
    <div id="loader" class="loader">
        <div class="bicep-emoji">💪🏻</div>
        <p class="loader-text">ЗАГРУЗКА...</p>
    </div>

    <div id="app" style="visibility: hidden;">
        <!-- ЭКРАН 1: ГЛАВНАЯ -->
        <section id="home-screen" class="screen">
            <div class="rpg-logo">RPG</div>
            <p class="sub-logo">TRAINING APP</p>
            
            <div class="main-menu">
                <div class="menu-card" onclick="showScreen('workout-screen')">
                    <div class="menu-icon">🏋️</div>
                    <div class="menu-info">
                        <div class="menu-title">Зал</div>
                        <div class="menu-subtitle">ПРОГРАММА A • B • C</div>
                    </div>
                    <div class="menu-arrow">❯</div>
                </div>
                <div class="menu-card" onclick="showSoon()">
                    <div class="menu-icon">🏊</div>
                    <div class="menu-info">
                        <div class="menu-title">Бассейн</div>
                        <div class="menu-subtitle">СКОРО...</div>
                    </div>
                    <div class="menu-arrow">❯</div>
                </div>
                <button class="btn-dashed" onclick="showSoon()">+ СОЗДАТЬ ТРЕНИРОВКУ</button>
            </div>
        </section>

        <!-- ЭКРАН 2: ТРЕНИРОВКА -->
        <section id="workout-screen" class="screen hidden">
            <header class="header-fixed">
                <div class="progress-wrap">
                    <span id="progress-text">0/10</span>
                    <div class="bar-bg"><div id="bar-fill"></div></div>
                </div>
            </header>

            <div id="exercise-list" class="content-scroll"></div>

            <div class="footer-spacer"></div>
        </section>

        <!-- ТАБ-БАР -->
        <nav class="tab-bar">
            <div class="tab-island">
                <div class="tab-btn" onclick="showScreen('home-screen')">
                    <span>💎</span><label>Тренировки</label>
                </div>
                <div class="tab-btn active-day" onclick="openDayPicker()">
                    <span id="tab-day-val" class="tiny">A</span><label>День</label>
                </div>
                <div class="tab-btn" onclick="showSoon()">
                    <span>⚙️</span><label>Настройки</label>
                </div>
            </div>
        </nav>

        <!-- МОДАЛКА: ВЫБОР ДНЯ -->
        <div id="day-picker" class="overlay hidden" onclick="closeModals()">
            <div class="sheet" onclick="event.stopPropagation()">
                <div class="handle"></div>
                <div class="sheet-title">ДЕНЬ ТРЕНИРОВКИ</div>
                <div class="days-grid">
                    <div class="day-card" id="d-A" onclick="setDay('A')"><span>A</span><small>ДЕНЬ A</small></div>
                    <div class="day-card" id="d-B" onclick="setDay('B')"><span>B</span><small>ДЕНЬ B</small></div>
                    <div class="day-card" id="d-C" onclick="setDay('C')"><span>C</span><small>ДЕНЬ C</small></div>
                </div>
            </div>
        </div>

        <!-- МОДАЛКА: ЗАМЕНА -->
        <div id="replace-screen" class="full-page hidden">
            <div class="page-header">
                <button class="back-btn" onclick="closeModals()">← НАЗАД</button>
                <div class="header-center">
                    <div class="tiny">ЗАМЕНА</div>
                    <div id="replace-sub" class="filter-tag"></div>
                </div>
            </div>
            <div id="replace-list" class="page-body"></div>
            <div id="replace-footer" class="page-footer hidden">
                <button class="btn-green-main" onclick="applyReplacement()">ЗАМЕНИТЬ УПРАЖНЕНИЕ</button>
            </div>
        </div>

        <!-- МОДАЛКА: ИНФО -->
        <div id="info-screen" class="full-page hidden">
            <div class="page-header">
                <button class="back-btn" onclick="closeModals()">← НАЗАД</button>
                <div class="tiny">ИНФОРМАЦИЯ</div>
            </div>
            <div id="info-body" class="page-body"></div>
        </div>

        <!-- МОДАЛКА: ФИНИШ -->
        <div id="finish-modal" class="overlay hidden">
            <div class="modal-finish">
                <div class="fire-anim">🔥</div>
                <div class="tiny" style="font-size: 32px; color: #9ED153;">ОТЛИЧНО!</div>
                <p>Тренировка завершена. Отличная работа!</p>
                <button class="btn-green-main" onclick="tg.close()">ОК, ЗАКРЫТЬ</button>
                <div class="link-gray" onclick="closeModals()">Вернуться</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
