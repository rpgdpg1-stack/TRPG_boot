<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <style>
    @keyframes immAshFloat1 {
      0%   { transform:translate(0,0);      opacity:0 }
      12%  { opacity:1 }
      50%  { transform:translate(2px,-15px) }
      88%  { opacity:.85 }
      100% { transform:translate(0,-30px);  opacity:0 }
    }
    @keyframes immAshFloat2 {
      0%   { transform:translate(0,0);      opacity:0 }
      12%  { opacity:1 }
      50%  { transform:translate(-2px,-15px) }
      88%  { opacity:.85 }
      100% { transform:translate(1px,-30px); opacity:0 }
    }
    @keyframes immAura { 0%,100%{ opacity:0.4 } 50%{ opacity:0.85 } }
    .imm-ring { animation: immAura 2.6s ease-in-out infinite; }
    .imm-px { transform-box:fill-box; }
    .imm-p1 { animation: immAshFloat1 6s linear infinite 0s; }
    .imm-p2 { animation: immAshFloat2 6s linear infinite -1s; }
    .imm-p3 { animation: immAshFloat1 6s linear infinite -2s; }
    .imm-p4 { animation: immAshFloat2 6s linear infinite -3s; }
    .imm-p5 { animation: immAshFloat1 6s linear infinite -4s; }
    .imm-p6 { animation: immAshFloat2 6s linear infinite -5s; }
    @media (prefers-reduced-motion: reduce) {
      .imm-ring { animation:none; opacity:0.85; }
      .imm-px { animation:none; opacity:0; }
    }
  </style>
  <clipPath id="immAshClip"><rect x="4" y="4" width="92" height="92" rx="23"/></clipPath>
  <g clip-path="url(#immAshClip)">
    <rect class="imm-px imm-p1" x="26" y="82" width="3" height="3" fill="#FFD700" opacity="0.85"/>
    <rect class="imm-px imm-p2" x="46" y="84" width="1.8" height="1.8" fill="#FFE9A8" opacity="0.6"/>
    <rect class="imm-px imm-p3" x="62" y="83" width="3.5" height="3.5" fill="#FFD700" opacity="0.7"/>
    <rect class="imm-px imm-p4" x="38" y="83" width="2" height="2" fill="#C79A2E" opacity="0.5"/>
    <rect class="imm-px imm-p5" x="74" y="84" width="2.5" height="2.5" fill="#FFD700" opacity="0.75"/>
    <rect class="imm-px imm-p6" x="54" y="85" width="1.5" height="1.5" fill="#B8862B" opacity="0.45"/>
  </g>
  <rect class="imm-ring" x="8" y="8" width="84" height="84" rx="22" fill="none" stroke="#FFD700" stroke-width="3"/>
  <rect x="11" y="11" width="78" height="78" rx="19" fill="none" stroke="#BA7517" stroke-width="1"/>
</svg>