<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <style>
    @keyframes legAura { 0%,100%{ opacity:0.3 } 50%{ opacity:0.7 } }
    @keyframes legTwinkle { 0%,100%{ opacity:0.4; transform:scale(0.85) } 50%{ opacity:1; transform:scale(1.1) } }
    @keyframes legHue { 0%{ fill:#E84545 } 25%{ fill:#FF8C42 } 50%{ fill:#FFD36B } 75%{ fill:#FF6BC4 } 100%{ fill:#E84545 } }
    .leg-ring { animation: legAura 2.6s ease-in-out infinite; }
    .leg-star { transform-box:fill-box; transform-origin:center; }
    .leg-s1 { animation: legTwinkle 3.4s ease-in-out infinite, legHue 5s linear infinite; }
    .leg-s2 { animation: legTwinkle 3.4s ease-in-out infinite 1.1s, legHue 5s linear infinite 0.9s; }
    .leg-s3 { animation: legTwinkle 3.4s ease-in-out infinite 1.9s, legHue 5s linear infinite 1.8s; }
    @media (prefers-reduced-motion: reduce) {
      .leg-ring { animation:none; opacity:0.6; }
      .leg-s1, .leg-s2, .leg-s3 { animation:none; opacity:0.9; fill:#FFD36B; }
    }
  </style>
  <rect class="leg-ring" x="8" y="8" width="84" height="84" rx="22" fill="none" stroke="#E84545" stroke-width="3.5"/>
  <path class="leg-star leg-s1" d="M50 2 l1.6 4.2 4.2 1.6 -4.2 1.6 -1.6 4.2 -1.6 -4.2 -4.2 -1.6 4.2 -1.6Z" fill="#E84545"/>
  <path class="leg-star leg-s2" d="M92 50 l1.6 4.2 4.2 1.6 -4.2 1.6 -1.6 4.2 -1.6 -4.2 -4.2 -1.6 4.2 -1.6Z" fill="#E84545"/>
  <path class="leg-star leg-s3" d="M8 50 l1.6 4.2 4.2 1.6 -4.2 1.6 -1.6 4.2 -1.6 -4.2 -4.2 -1.6 4.2 -1.6Z" fill="#E84545"/>
</svg>